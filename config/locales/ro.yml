  app_owner_application_about_p2_html: |
    Începând cu 2022, solicităm aprobarea manuală pentru utilizatorii care doresc să facă clienți API.
    Pentru a crea aplicații terțe, trebuie mai întâi să trimiteți o cerere pentru a deveni
    un "proprietar de aplicație". Această aplicație ar trebui să descrie funcționalitatea aplicației propuse
    și cum intenționați să-l utilizați. Pentru a depune o cerere, contul dumneavoastră trebuie să fie la
    cel puțin 2 luni și trebuie să fi făcut cel puțin 10 <a href="https://help.inaturalist.org/support/solutions/articles/151000170241"
    target="_blank">îmbunătățirea identificărilor</a> în ultima lună. Putem cere urmărire
    întrebări despre planul dumneavoastră și ne rezervăm dreptul de a refuza cererile din orice motiv.
  #A confirmation message after a user initially presses the delete button for a sound to ensure they want to proceed with deletion.
