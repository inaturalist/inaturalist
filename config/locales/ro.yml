  views:
    announcements:
      locales_desc: |
        CMD- sau SHIFT-clic pentru a selecta mai multe. Selectarea "Toate" sau nerealizarea
        O selecție va afișa anunțul tuturor utilizatorilor, indiferent de
        setări regionale. Alegerea unei limbi fără regiune *nu* va viza
        locale cu regiuni, de exemplu, dacă ați ales engleza, nu va apărea
        pentru persoanele care au ales engleza (Marea Britanie).
      clients_desc: |
        CMD- sau SHIFT-clic pentru a selecta mai multe. Selectarea "Toate" sau nerealizarea
        O selecție va afișa anunțul tuturor utilizatorilor, indiferent de
        client.
      end_desc: |
        Ora din fusul orar al contului în care acest anunț se va opri
        Apare. Se aplică în toate fusurile orare, astfel încât toată lumea nu va mai vedea
        în același timp, nu în raport cu ora lor locală.
      excludes_non_site_desc: |
        Dacă anunțul tău vizează un site (care este implicit dacă ești un
        Administratorul site-ului), acest lucru va exclude anunțurile care vizează toate site-urile din
        această plasare.
      ip_countries_desc: |
        CMD- sau SHIFT-clic pentru a selecta mai multe. Selectarea "Toate" sau nerealizarea
        O selecție va afișa anunțul tuturor utilizatorilor, indiferent de
        Țara IP.
      exclude_ip_countries_desc: |
        CMD sau SHIFT-clic pentru a selecta mai multe. Țările selectate nu vor fi afișate
        anunțul. Dacă sunt selectate țări IP, selectați Excludere țări IP
        vor fi scăzute din primul.
      #Note about how the announcement last observation date property works
      last_observation_date_desc: |
        Rețineți că data de creare a celei mai recente creații a utilizatorului
        observația este stocată în cache, deci ar putea dura câteva ore pentru ca direcționarea către
        Intră în vigoare
      observation_oauth_application_ids_desc: |
        CMD- sau SHIFT-clic pentru a selecta mai multe. Selectarea "Toate" sau nerealizarea
        O selecție va afișa anunțul tuturor utilizatorilor, indiferent de
        App.
      site_ids_desc: |
        CMD- sau SHIFT-clic pentru a selecta mai multe. Selectarea "Toate" sau nerealizarea
        O selecție va afișa anunțul tuturor utilizatorilor, indiferent de
        afilierea la site.
      start_desc: |
        Ora din fusul orar al contului în care va începe acest anunț
        Apare. Se aplică pe toate fusurile orare, astfel încât toată lumea va începe să vadă
        în același timp, nu în raport cu ora lor locală.
      #Description of a group of options for targeting announcements based
      #on donation behavior
      target_users_by_donation_behavior: Vizați utilizatorii în funcție de comportamentul donațiilor
      #Description of a group of options for targeting announcements based
      #on identification behavior
      target_users_by_identification_behavior: Vizați utilizatorii după comportamentul de identificare
      #Description of a group of options for targeting announcements based
      #on observation behavior
      target_users_by_observation_behavior: Vizați utilizatorii în funcție de comportamentul de observare
      #Description of a group of options for targeting announcements based
      #miscellaneous user attributes
      target_users_by_other_attributes: Vizați utilizatorii după alte atribute
    atlases:
      show:
        #Title for section describing atlases
        about_atlases: Despre Atlases
        #Description of what atlases are
        atlases_convey_the_global_distribution: |
          Atlasele transmit distribuția globală a unui taxon. Curatorii fac
          prin definirea structurii unui atlas și organizarea
          taxoni listați care îl conduc.
        #Label for a button that divides a place in an atlas into it's
