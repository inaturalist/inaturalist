        unexplode_this_place: Deexplodează acest loc
        #Notice when an atlas has not been altered
        no_alterations_to_this_atlas_yet: Nu există încă modificări la acest atlas
        #Title for a section showing recent alterations to an atlas
        recent_atlas_alterations: Modificări recente ale Atlasului
        #Title for a section showing taxa that were recently added to a check
        #list
        recent_listed_taxon_additions: Modificări recente ale taxonilor listați
        #Label for a button that shows taxa on checklists for a place
        show_listed_taxa: Afișați taxonii listați
        #Notice when an atlas is not active
        this_atlas_is_not_currently_active: Acest atlas nu este activ în prezent
        #Warning before removing a place from an atlas
        this_will_remove_this_taxon_and_all: |
          Acest lucru va elimina acest taxon și toți descendenții săi de pe listele de verificare
          asociat cu acest loc și cu orice locuri standard pe care le conține. El
          nu poate fi anulat. Ești sigur că vrei să faci asta?
        #Warning when there are observations outside of the places defined by
        #the atlas
        warning_there_are_observations_not_represented: |
          Avertisment: există observații care nu sunt reprezentate de acest atlas
    email_confirmation:
      click_here_to_resend_a_confirmation_email: Faceți clic aici pentru a retrimite un e-mail de confirmare
      #message displayed after users trigger sending a email to confirm their email address
      confirmation_email_sent: E-mail de confirmare trimis
      #text displayed before showing a user the email address that we will
      #resend a confirmation email to
      here_is_the_email_colon: |
        Iată adresa de e-mail la care vom trimite confirmarea:
      #statement introducing suggestions for users that do no receive confirmation emails
      if_you_do_not_receive_the_email_here_are_tips_colon: |
        Dacă nu primiți e-mailul, iată câteva sfaturi:
      #statement telling users to contact us if they are not receiving confirmation emails
      if_you_are_still_not_receiving_email_contact_us_html: Dacă tot nu primiți e-mailul de confirmare, vă rugăm să ne contactați la <a href="mailto:help+confirmation@inaturalist.org">help@inaturalist.org</a> astfel încât să vă putem ajuta.
      please_add_an_email_and_password: Vă rugăm să adăugați un e-mail și o parolă pentru a nu pierde accesul la contul dvs.
      please_click_the_link_sent_to_email_to_confirm_html: Vă rugăm să faceți clic pe linkul trimis la <span class="email">%{email}</span> pentru a vă confirma adresa de e-mail.
      please_confirm_that_email_is_the_best_contact_html: Vă rugăm să confirmați că <span class="email">%{email}</span> este cel mai bun mod de a vă contacta. #message requesting users confirm their email address to be able to engage with other users
      please_confirm_to_interact_and_access: Vă rugăm să vă confirmați adresa de e-mail pentru a interacționa cu conținutul altor utilizatori și pentru a accesa anumite pagini. #message requesting that a user confirm their email address, displaying the email to confirm
      please_confirm_your_email_address_html: Vă rugăm să confirmați adresa de e-mail <span class="email">%{email}</span>. #statement used in areas that might contain a form allowing users to add comments, etc. This # informs users they must confirm their email address if they want to be able to interact
      please_confirm_to_interact: Vă rugăm să vă confirmați adresa de e-mail pentru a interacționa cu conținutul altor utilizatori
      #statement used on pages that are not functional unless a user has confirmed their email address
      please_confirm_to_use_this_page: Vă rugăm să confirmați adresa de e-mail pentru a utiliza această pagină
      #tip for users who do not receive confirmation emails to check if their email view is filtered
      tips_check_email_filters: Verificați dacă există filtrele pe care le-ați creat și care ar putea elimina e-mailurile noastre din căsuța de e-mail #tip for users who do not receive confirmation emails to check their email spam folder
      tips_check_your_spam_folder: Verificați folderul de spam
      your_site_account_has_no_email: Vostru %{site_name} nu are nicio adresă de e-mail asociată.
    guides:
      index:
        funding2_html: |
          Finanțarea pentru dezvoltarea ghidurilor a fost asigurată de
          <a href="http://eol.org"><img alt="Encyclopedia of Life" src="%{image_url}"></a>
    messages:
      index:
        #Users cannot create messages if they lack the criteria for
        #earning interaction privilege
        interaction_privilege_notice: |
          Vei putea trimite mesaje noi după ce ai confirmat e-mailul
          adresă. Deocamdată puteți citi și răspunde la mesajele pe care vi le trimit alte persoane.
        #Users cannot create messages if they lack the criteria for
        #earning interaction or speech privilege
        privilege_notice: |
          Vei putea trimite mesaje noi după ce ai confirmat e-mailul
          și a adăugat trei observații verificabile sau trei identificări
          pentru alții. Deocamdată puteți citi și răspunde la mesajele pe care vi le trimit alte persoane.
    observations:
      show:
        #One of a list of requirements an observation must meet to be in the Research Grade category
        dqa_help_research_grade_community_observation_html: |
          cel <strong>Taxonul comunitar și taxonul de observare se potrivesc</strong>
          (pentru acele rare ocazii în care taxonul de observare poate fi mai mult
          specific taxonului comunitar)
        #One of a list of reasons for an observation to revert to Casual
        dqa_help_casual_not_accurate_evidence_html: |
          Observația <strong>nu prezintă dovezi exacte ale organismului sau
          scenă</strong> (de exemplu, inteligența artificială a fost utilizată pentru a adăuga, elimina sau înlocui
          elemente din imagine sau sunet. Reducerea zgomotului, stivuirea focalizării sau crearea
          remedieri mici, cum ar fi îndepărtarea prafului senzorului, sunt de obicei OK).
    sounds:
      show:
        #The user has been warned that an uploaded sound file has been noted as being problematic.
        #To bypass the warning, this additional text provides a link to the sound and guidance.
        view_original_html: |
          Puteți vizualiza originalul la <a href="%{url}">%{url}</a>. Vă rog
          lăsați semnalizările de încălcare a drepturilor de autor ca nerezolvate dacă acest sunet
          încalcă drepturile de autor.
    taxa:
      edit:
        #a message when you try to save major changes to a taoxn name
        you_can_only_make_minor_changes_to_the_species_epithet_directly_html: |
          Puteți face doar modificări minore la epitetul speciei direct (de exemplu, schimbări de gen, greșeli de ortografie). Adăugați un <a target="_blank" href="%{url}">Schimb de taxoni</a> dacă aveți nevoie de alte modificări ale numelui.
      show:
        site_curators_disabled_wikipedia_html: |
          Curatorii site-ului au dezactivat afișarea <a href="%{url}">acest
          conținut din Wikipedia</a>. Puteți ajuta editând pagina pe
          Wikipedia pentru a-l face adecvat pentru acest taxon sau prin marcarea acestui
          taxon pentru a-l aduce în atenția curatorilor site-ului.
      #error message when the Flickr tagger feature fails
      something_went_wrong_tags: |
        Ceva nu a mers bine încercând să postez acele etichete: %{message}
    users:
      edit:
        block_desc_blocking_someone_prevents: |
          Blocarea cuiva îl împiedică să-ți trimită mesaje, să comenteze
          observații, identificarea observațiilor și interacțiunea în alt mod
          cu tine pe %{site_name}. De asemenea, elimină observațiile lor din
          rezultatele căutării și elimină observațiile din căutarea lor
          Rezultatele. Cu toate acestea, nu te face invizibil pentru ei. Ei pot
          încă îți găsesc observațiile și îți văd profilul, pur și simplu nu pot
          interacționează cu tine.
        block_desc_blocking_is_for_situations: |
          Blocarea este pentru situațiile în care pur și simplu nu te poți înțelege
          cineva și nu te va lăsa în pace, în ciuda eforturilor tale de a
          rezolvă disputele într-o manieră civilizată. Nu este o modalitate de a te ascunde
          oameni, pentru a preveni identificarea persoanelor ale căror opinii
          nu aveți încredere sau să renunțați la ID-ul comunității (există un alt
          cadru pentru asta). Astfel, blocarea funcționează în ambele sensuri: dacă blocați
          cineva, nu poate interacționa cu tine, dar nici tu nu poți interacționa
          cu ei. Dacă îl utilizați în mod abuziv pentru a împiedica pe cineva să vă identifice
          observații, de asemenea, vă împiedicați să identificați
          Observaţii.
        block_desc_you_can_only_block_html: |
          Puteți bloca doar trei persoane. Credem că acesta este un lucru rezonabil
          numărul care găzduiește persoanele care au nevoie de blocare în timp ce
          prevenirea abuzului de blocare. Dacă simți că trebuie să blochezi mai mult
          oameni, vă rog <a href="mailto:%{help_email}">Contactați-ne</a>.
        block_desc_there_are_two_exceptions: |
          Există două situații în care blocarea nu împiedică interacțiunea:
        errors:
          #error message when a user attempts to update their profile picture using
          #an image that has an unsupported file type
          unsupported_file_type: Tipul de fișier nu este acceptat. Acceptăm JPG, PNG și GIF
        this_only_applies_to_traditional_projects2: |
          Acest lucru este valabil doar pentru proiectele tradiționale. Nu poți exclude observațiile
          din proiecte de colecție sau umbrelă, care sunt în esență căutări salvate.
          Puteți citi mai multe
          <a href="https://help.inaturalist.org/support/solutions/articles/151000176472">aici</a>.
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: Unde curiozitatea ta contribuie la știință.
          #Hero subheadline describing the core value proposition
          #TODO: test that line break here doesn't cause line break
          subheadline: >
            Identifică plante, animale, ciuperci și altele, adăugând în același timp la un atlas viu al vieții de pe Pământ.
          #Primary call-to-action button in the hero section
          cta_join: Alătură-te comunității
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: Gratuit, nonprofit, alimentat de comunitate.
        features:
          #Section label introducing the three core user actions
          intro: "Cu iNaturalist, poți:"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: plante, animale, ciuperci și altele
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: specii pe care le-ai văzut în întreaga lume
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: către știința adevărată
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: Natură din apropiere
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: Dintr-o comunitate globală de naturaliști
        stories:
          #Section heading for real-world stories powered by community science
          heading: Puterea științei comunitare
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: Văzut de %{user} în %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: Redescoperirea speciilor pierdute de mult
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            The %{moth_common_name} Molia nu mai fusese observată de decenii și odată se credea dispărută — până când un turist din Noua Zeelandă a observat-o din întâmplare.
          #Heading for the story about a new-to-science mantis species
          mantis_heading: Descoperirea unor specii noi pentru știință
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">Inimia nat</span> — prescurtat ca <span class="italic">I. nat</span> — este o specie nouă pentru știință de mantis descoperită de o femeie din Australia care se plimba prin cartierul ei.
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: Protejarea ecosistemelor locale
          #Body text for the amphibian protection story
          amphibian_body: >
            Un grup de voluntari locali din California s-a reunit prin iNaturalist pentru a proteja amfibienii migratori care traversează un drum aglomerat.
          #Link below the stories to read more community science stories
          read_more: Citește mai multe povești
        observation:
          #Heading for the sample observation section
          heading: Fiecare observație spune o poveste
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: observațiile care contribuie la știința biodiversității
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: Specii documentate la nivel global
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: lucrări care citează date iNaturalist
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: specii descoperite sau redescoperite de oamenii de știință comunitari
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            Deschide aplicația și fotografiază orice plantă, animal, ciupercă sau alt organism sălbatic — din cartierul tău sau de oriunde în lume.
          #Step 2 description — explaining AI and community identification
          step2_body: >
            Aplicația sugerează o identificare instantanee, iar o comunitate globală de naturaliști o confirmă sau o rafinează.
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            Observația ta devine date deschise — folosite de oameni de știință, conservatori și cercetători din întreaga lume.
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            Natura se schimbă mai repede ca niciodată, așa că avem nevoie <span class="underline">Tu</span> pentru a ajuta la înregistrarea a ceea ce trăiește și unde.
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            M-a ajutat cu adevărat în identificarea speciilor, pe lângă faptul că mi-a oferit oportunitatea de a interacționa cu diferite persoane din întreaga lume.
          #Job title and location of the testimonial author (last name Gube)
          gube_title: Conservator marin și fotograf subacvatic, Kenya
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            iNaturalist deschide ușa către atât de multe cercetări noi și interesante despre taxonii substudiați. În opinia mea, această platformă este de avangardă în știința ecologică.
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: Autor de ghiduri de teren la Owlfly LLC, SUA
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            iNaturalist și comunitatea sa dedicată de identificatori au devenit o resursă de neprețuit în explorările mele. A ajutat la punerea bazelor muncii mele actuale.
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: Cercetător în biodiversitate, Sri Lanka
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist este un instrument puternic care conectează oamenii, natura și cunoașterea. Pot fotografia o specie rară, sau chiar una care încă nu a fost descrisă, și, în același timp, contribui la conservarea patrimoniului nostru natural.
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: Tehnician de mediu și fotograf amator, Brazilia
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            Indiferent unde în lume te afli, fie că ai un doctorat sau pur și simplu iubești natura, iNaturalist te va apropia de natură și de mulți alți naturaliști.
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: Biolog, Mexic
        everyone:
          #Heading for the broad audience section
          heading: Toată lumea este naturalistă
          #Description inviting anyone who has been curious about a living thing
          body: >
            Dacă te-ai uitat vreodată cu atenție la ceva viu și te-ai întrebat ce este, iNaturalist este pentru tine.
          #Heading for the impact sub-section
          impact_heading: Poți avea un impact
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            Fiecare fotografie pe care o împărtășești devine parte dintr-o evidență științifică globală pe care cercetătorii din întreaga lume se bazează.
          #Heading for the community reputation sub-section
          community_heading: '"Cel mai frumos loc online"'
          #Description of the welcoming community aspect
          community_body: >
            Vino pentru identificări, rămâi pentru comunitate și pentru impactul asupra științei.
        download:
          #Heading prompting users to download the mobile app
          heading: Descarcă aplicația iNaturalist
          #Subheading describing the two core benefits of the app
          subheading: Obține identificări în timp real și contribuie la știință
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ Descărcări"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: Explorează specii la nivel mondial
          #Button / link to browse species without downloading
          button: Explorează acum
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "Sub 13 ani? Descarcă Seek!"
          #Description of Seek's badge and challenge features
          body: Câștigă insigne și participă la provocări pentru a observa specii!
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ Recenzii de 5 stele"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: Înscrieți-vă newsletterul nostru lunar!
          #Description of the newsletter's content
          body: Rămâi conectat cu poveștile și descoperirile comunității iNaturalist.
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist este o organizație nonprofit care susține știința și conservarea.
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: Sprijinul tău face asta posibil.
          #Call-to-action button for the donation section
          cta: Donează acum
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: Întrebări frecvente
          #FAQ: uploading existing photos — question
          upload_existing_question: Pot să încarc fotografii pe care le am deja?
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            Da! Atâta timp cât știi aproximativ când și unde a fost făcută o fotografie, fotografiile mai vechi sunt binevenite.
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: Cine poate face știință cu observațiile iNaturalist?
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            Oricine! Toate observațiile iNaturalist sunt deschise și disponibile gratuit — pentru cercetători, practicieni în conservare și persoane curioase deopotrivă.
          #FAQ: research grade definition — question
          research_grade_question: Ce înseamnă "grad de cercetare"?
          #FAQ: research grade definition — answer
          research_grade_answer: >
            Când comunitatea este de acord asupra unei identificări, o observație devine "de grad de cercetare" și intră în evidența științifică globală. Orice identificare poate ajuta la obținerea acestuia.
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: Trebuie să știu la ce mă uit?
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            Deloc! Distribuie o fotografie și o comunitate globală de naturaliști te poate ajuta să o identifici.
          #FAQ: whether the app is required — question
          need_app_question: Trebuie să folosesc aplicația?
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            Pe desktop, iNaturalist.org funcționează foarte bine. Pe un dispozitiv mobil, aplicația îți oferă cea mai bună experiență — mai ales pentru identificarea speciilor în mișcare.
