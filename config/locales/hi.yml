  views:
    announcements:
      locales_desc: |
        एकाधिक का चयन करने के लिए CMD- या SHIFT-क्लिक करें. "सभी" का चयन करना या नहीं बनाना
        एक चयन सभी उपयोगकर्ताओं को घोषणा दिखाएगा, भले ही
        स्थान। एक क्षेत्र के बिना एक भाषा चुनना * लक्ष्य नहीं होगा
        क्षेत्रों वाले स्थान, उदा. अगर आपने अंग्रेज़ी चुना है, तो वह दिखाई नहीं देगी
        उन लोगों के लिए जिन्होंने अंग्रेजी (यूके) चुना है।
      clients_desc: |
        एकाधिक का चयन करने के लिए CMD- या SHIFT-क्लिक करें. "सभी" का चयन करना या नहीं बनाना
        एक चयन सभी उपयोगकर्ताओं को घोषणा दिखाएगा, भले ही
        ग्राहक।
      end_desc: |
        आपके खाते के समय क्षेत्र में यह घोषणा रुकने का समय
        दिखने। समय क्षेत्रों में लागू होता है, इसलिए हर कोई देखना बंद कर देगा
        यह एक ही समय में, उनके स्थानीय समय के सापेक्ष नहीं है।
      excludes_non_site_desc: |
        अगर आपकी घोषणा किसी साइट को लक्षित करती है (जो डिफ़ॉल्ट है यदि आप
        साइट व्यवस्थापक), यह उन घोषणाओं को बाहर कर देगा जो सभी साइटों को लक्षित करती हैं
        यह प्लेसमेंट।
      ip_countries_desc: |
        एकाधिक का चयन करने के लिए CMD- या SHIFT-क्लिक करें. "सभी" का चयन करना या नहीं बनाना
        एक चयन सभी उपयोगकर्ताओं को घोषणा दिखाएगा, भले ही
        आईपी देश।
      exclude_ip_countries_desc: |
        CMD- या SHIFT-क्लिक करें एकाधिक का चयन करने के लिए। चयनित देशों को नहीं दिखाया जाएगा
        घोषणा। यदि IP देशों का चयन किया जाता है, तो चयनित IP देशों को बाहर निकालें
        पूर्व से घटाया जाएगा।
      #Note about how the announcement last observation date property works
      last_observation_date_desc: |
        ध्यान दें कि उपयोगकर्ता के सबसे हाल ही में बनाए गए निर्माण की तारीख
        निगरानी कैश की जाती है, इसलिए इसे लक्षित करने में कुछ घंटे लग सकते हैं
        प्रभावी
      observation_oauth_application_ids_desc: |
        एकाधिक का चयन करने के लिए CMD- या SHIFT-क्लिक करें. "सभी" का चयन करना या नहीं बनाना
        एक चयन सभी उपयोगकर्ताओं को घोषणा दिखाएगा, भले ही
        अनुप्रयोग।
      site_ids_desc: |
        एकाधिक का चयन करने के लिए CMD- या SHIFT-क्लिक करें. "सभी" का चयन करना या नहीं बनाना
        एक चयन सभी उपयोगकर्ताओं को घोषणा दिखाएगा, भले ही
        साइट संबद्धता।
      start_desc: |
        आपके खाते के समय क्षेत्र में वह समय जब यह घोषणा शुरू होगी
        दिखने। समय क्षेत्रों में लागू होता है, इसलिए हर कोई देखना शुरू कर देगा
        यह एक ही समय में, उनके स्थानीय समय के सापेक्ष नहीं है।
      #Description of a group of options for targeting announcements based
      #on donation behavior
      target_users_by_donation_behavior: दान व्यवहार द्वारा उपयोगकर्ताओं को लक्षित करें
      #Description of a group of options for targeting announcements based
      #on identification behavior
      target_users_by_identification_behavior: पहचान व्यवहार द्वारा उपयोगकर्ताओं को लक्षित करें
      #Description of a group of options for targeting announcements based
      #on observation behavior
      target_users_by_observation_behavior: अवलोकन व्यवहार द्वारा उपयोगकर्ताओं को लक्षित करें
      #Description of a group of options for targeting announcements based
      #miscellaneous user attributes
      target_users_by_other_attributes: अन्य विशेषताओं के आधार पर उपयोगकर्ताओं को लक्षित करें
    email_confirmation:
      click_here_to_resend_a_confirmation_email: पुष्टिकरण ईमेल पुनः भेजने के लिए यहां क्लिक करें
      #message displayed after users trigger sending a email to confirm their email address
      confirmation_email_sent: पुष्टिकरण ईमेल भेजा गया
      #text displayed before showing a user the email address that we will
      #resend a confirmation email to
      here_is_the_email_colon: |
        यहां वह ईमेल पता है जिसे हम पुष्टिकरण भेजेंगे:
      #statement introducing suggestions for users that do no receive confirmation emails
      if_you_do_not_receive_the_email_here_are_tips_colon: |
        यदि आपको ईमेल प्राप्त नहीं होता है, तो यहां कुछ युक्तियां दी गई हैं:
      #statement telling users to contact us if they are not receiving confirmation emails
      if_you_are_still_not_receiving_email_contact_us_html: यदि आपको अभी भी पुष्टिकरण ईमेल प्राप्त नहीं हो रहा है, तो कृपया हमसे संपर्क करें <a href="mailto:help+confirmation@inaturalist.org">help@inaturalist.org</a> तो हम आपकी सहायता कर सकते हैं।
      please_add_an_email_and_password: कृपया एक ईमेल और पासवर्ड जोड़ें ताकि आप अपने खाते तक पहुंच न खोएं
      please_click_the_link_sent_to_email_to_confirm_html: कृपया भेजे गए लिंक पर क्लिक करें <span class="email">%{email}</span> अपने ईमेल पते की पुष्टि करने के लिए।
      please_confirm_that_email_is_the_best_contact_html: कृपया पुष्टि करें कि <span class="email">%{email}</span> आपसे संपर्क करने का सबसे अच्छा तरीका है। #message requesting users confirm their email address to be able to engage with other users
      please_confirm_to_interact_and_access: कृपया अन्य उपयोगकर्ताओं की सामग्री के साथ बातचीत करने और कुछ पृष्ठों तक पहुंचने के लिए अपने ईमेल पते की पुष्टि करें। #message requesting that a user confirm their email address, displaying the email to confirm
      please_confirm_your_email_address_html: कृपया अपने ईमेल पते की पुष्टि करें <span class="email">%{email}</span>. #statement used in areas that might contain a form allowing users to add comments, etc. This # informs users they must confirm their email address if they want to be able to interact
      please_confirm_to_interact: अन्य उपयोगकर्ताओं की सामग्री के साथ बातचीत करने के लिए कृपया अपने ईमेल पते की पुष्टि करें
      #statement used on pages that are not functional unless a user has confirmed their email address
      please_confirm_to_use_this_page: कृपया इस पृष्ठ का उपयोग करने के लिए अपने ईमेल पते की पुष्टि करें
      #tip for users who do not receive confirmation emails to check if their email view is filtered
      tips_check_email_filters: आपके द्वारा किए गए किसी भी फ़िल्टर की जाँच करें जो आपके इनबॉक्स से हमारे ईमेल निकाल सकता है #tip for users who do not receive confirmation emails to check their email spam folder
      tips_check_your_spam_folder: अपना स्पैम फ़ोल्डर जांचें
      your_site_account_has_no_email: तुम्हारा %{site_name} खाते के साथ कोई ईमेल पता संबद्ध नहीं है।
    guides:
      index:
        funding2_html: |
          गाइड के विकास के लिए धन किसके द्वारा प्रदान किया गया था
          <a href="http://eol.org"><img alt="Encyclopedia of Life" src="%{image_url}"></a>
    messages:
      index:
        #Users cannot create messages if they lack the criteria for
        #earning interaction privilege
        interaction_privilege_notice: |
          अपना ईमेल कन्फ़र्म करने के बाद आप नए संदेश भेज पाएँगे
          पता। अभी के लिए, आप अन्य लोगों द्वारा आपको भेजे गए संदेश को पढ़ सकते हैं और उनका उत्तर दे सकते हैं.
        #Users cannot create messages if they lack the criteria for
        #earning interaction or speech privilege
        privilege_notice: |
          अपना ईमेल कन्फ़र्म करने के बाद आप नए संदेश भेज पाएँगे
          पता, और तीन सत्यापन योग्य टिप्पणियों या तीन पहचानों को जोड़ा
          दूसरों के लिए। अभी के लिए, आप अन्य लोगों द्वारा आपको भेजे गए संदेश को पढ़ सकते हैं और उनका उत्तर दे सकते हैं.
    observations:
      show:
        #One of a list of requirements an observation must meet to be in the Research Grade category
        dqa_help_research_grade_community_observation_html: |
          वही <strong>सामुदायिक टैक्सोन और अवलोकन टैक्सोन मैच</strong>
          (उन दुर्लभ अवसरों के लिए जब अवलोकन टैक्सोन अधिक हो सकता है
          सामुदायिक टैक्सोन से विशिष्ट)
        #One of a list of reasons for an observation to revert to Casual
        dqa_help_casual_not_accurate_evidence_html: |
          अवलोकन <strong>जीव का सटीक प्रमाण प्रस्तुत नहीं करता है या
          दृश्य</strong> (उदाहरण के लिए कृत्रिम बुद्धिमत्ता का उपयोग जोड़ने, हटाने या बदलने के लिए किया गया था
          छवि या ध्वनि में तत्व। शोर करना, स्टैकिंग पर ध्यान केंद्रित करना या बनाना
          सेंसर की धूल को हटाने जैसे छोटे सुधार आमतौर पर ठीक होते हैं)।
    sounds:
      show:
        #The user has been warned that an uploaded sound file has been noted as being problematic.
        #To bypass the warning, this additional text provides a link to the sound and guidance.
        view_original_html: |
          आप मूल को यहां देख सकते हैं <a href="%{url}">%{url}</a>. कृपया
          कॉपीराइट उल्लंघन झंडे को अनसुलझे के रूप में छोड़ दें यदि यह ध्वनि करती है
          कॉपीराइट का उल्लंघन।
    taxa:
      edit:
        #a message when you try to save major changes to a taoxn name
        you_can_only_make_minor_changes_to_the_species_epithet_directly_html: |
          आप केवल प्रजातियों के विशेषण में सीधे मामूली बदलाव कर सकते हैं (उदाहरण के लिए लिंग परिवर्तन, गलत वर्तनी)। एक जोड़ें <a target="_blank" href="%{url}">टैक्सोन स्वैप</a> यदि आपको नाम में अन्य परिवर्तनों की आवश्यकता है।
      #error message when the Flickr tagger feature fails
      something_went_wrong_tags: |
        उन टैग को पोस्ट करने की कोशिश में कुछ गलत हो गया: %{message}
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: जहां आपकी जिज्ञासा विज्ञान में योगदान देती है।
          #Hero subheadline describing the core value proposition
          #TODO: test that line break here doesn't cause line break
          subheadline: >
            पृथ्वी पर जीवन के जीवित एटलस में जोड़ते हुए पौधों, जानवरों, कवक और बहुत कुछ की पहचान करें।
          #Primary call-to-action button in the hero section
          cta_join: समुदाय में शामिल हों
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: मुफ़्त, गैर-लाभकारी, समुदाय-संचालित।
        features:
          #Section label introducing the three core user actions
          intro: "iNaturalist के साथ, आप यह कर सकते हैं:"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: पौधे, जानवर, कवक, और बहुत कुछ
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: प्रजातियाँ जिन्हें आपने दुनिया भर में देखा है
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: वास्तविक विज्ञान के लिए
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: आस-पास की प्रकृति
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: प्रकृतिवादियों के वैश्विक समुदाय से
        stories:
          #Section heading for real-world stories powered by community science
          heading: सामुदायिक विज्ञान की शक्ति
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: द्वारा देखा गया %{user} में %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: लंबे समय से खोई हुई प्रजातियों को फिर से खोजना
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            द %{moth_common_name} कीट को दशकों में नहीं देखा गया था और एक बार इसे विलुप्त माना जाता था - जब तक कि न्यूजीलैंड में एक पर्यटक ने इसे दुर्घटना से नहीं देखा।
          #Heading for the story about a new-to-science mantis species
          mantis_heading: विज्ञान के लिए नई प्रजातियों की खोज
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">इनिमिया नेट</span> — संक्षिप्त रूप में <span class="italic">I. नट</span> - एक नई-से-विज्ञान मेंटिस प्रजाति है जो ऑस्ट्रेलिया में एक महिला द्वारा अपने पड़ोस में घूमती हुई पाई जाती है।
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: स्थानीय पारिस्थितिक तंत्र की रक्षा करना
          #Body text for the amphibian protection story
          amphibian_body: >
            कैलिफ़ोर्निया में स्थानीय स्वयंसेवकों का एक समूह एक व्यस्त सड़क पार करने वाले प्रवासी उभयचरों की रक्षा के लिए iNaturalist के माध्यम से एक साथ आया।
          #Link below the stories to read more community science stories
          read_more: और कहानियाँ पढ़ें
        observation:
          #Heading for the sample observation section
          heading: हर अवलोकन एक कहानी कहता है
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: जैव विविधता विज्ञान में योगदान देने वाले अवलोकन
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: दुनिया भर में प्रलेखित प्रजातियां
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: iNaturalist डेटा का हवाला देते हुए कागजात
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: समुदाय के वैज्ञानिकों द्वारा खोजी गई या फिर से खोजी गई प्रजातियां
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            ऐप खोलें और किसी भी जंगली पौधे, जानवर, कवक, या अन्य जीव की तस्वीर लें - अपने पड़ोस से या दुनिया में कहीं भी।
          #Step 2 description — explaining AI and community identification
          step2_body: >
            ऐप तुरंत एक पहचान का सुझाव देता है, और प्रकृतिवादियों का एक वैश्विक समुदाय इसकी पुष्टि या परिष्कृत करता है।
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            आपका अवलोकन खुला डेटा बन जाता है - दुनिया भर के वैज्ञानिकों, संरक्षणवादियों और शोधकर्ताओं द्वारा उपयोग किया जाता है।
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            प्रकृति पहले से कहीं अधिक तेजी से बदल रही है, इसलिए हमें चाहिए <span class="underline">आप</span> यह रिकॉर्ड करने में मदद करने के लिए कि क्या कहाँ रहता है।
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            इसने वास्तव में मुझे प्रजातियों की पहचान में मदद की है, इसके अलावा मुझे दुनिया भर के विभिन्न लोगों के साथ बातचीत करने का अवसर भी मिला है।
          #Job title and location of the testimonial author (last name Gube)
          gube_title: समुद्री संरक्षणवादी और पानी के नीचे फोटोग्राफर, केन्या
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            iNaturalist कम अध्ययन किए गए करों पर इतने सारे नए और रोमांचक शोध के द्वार खोलता है। मेरी राय में, यह मंच पारिस्थितिक विज्ञान की अत्याधुनिक है।
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: फील्ड गाइड लेखक Owlfly LLC, USA
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            iNaturalist और पहचानकर्ताओं का इसका समर्पित समुदाय मेरी खोजों में एक अमूल्य संसाधन बन गया। इसने मेरे वर्तमान कार्य की नींव रखने में मदद की।
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: जैव विविधता शोधकर्ता, श्रीलंका
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist एक शक्तिशाली उपकरण है जो लोगों, प्रकृति और ज्ञान को जोड़ता है। मैं एक दुर्लभ प्रजाति, या यहां तक कि एक की तस्वीर ले सकता हूं जिसका अभी तक वर्णन नहीं किया गया है, और साथ ही, मैं अपनी प्राकृतिक विरासत के संरक्षण में योगदान देता हूं।
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: पर्यावरण तकनीशियन और शौकिया फोटोग्राफर, ब्राजील
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            कोई फर्क नहीं पड़ता कि आप दुनिया में कहां हैं, चाहे आपके पास पीएचडी हो या सिर्फ बाहर से प्यार हो, iNaturalist आपको प्रकृति और कई साथी प्रकृतिवादियों के करीब लाएगा।
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: जीवविज्ञानी, मेक्सिको
        everyone:
          #Heading for the broad audience section
          heading: हर कोई प्रकृतिवादी है
          #Description inviting anyone who has been curious about a living thing
          body: >
            यदि आपने कभी किसी जीवित चीज़ को करीब से देखा है और सोचा है कि यह क्या था, तो iNaturalist आपके लिए है।
          #Heading for the impact sub-section
          impact_heading: आप प्रभाव डाल सकते हैं
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            आपके द्वारा साझा की जाने वाली प्रत्येक तस्वीर एक वैश्विक वैज्ञानिक रिकॉर्ड का हिस्सा बन जाती है जिस पर दुनिया भर के शोधकर्ता निर्भर करते हैं।
          #Heading for the community reputation sub-section
          community_heading: 'ऑनलाइन सबसे अच्छी जगह'
          #Description of the welcoming community aspect
          community_body: >
            पहचान के लिए आएं, समुदाय के लिए रहें और विज्ञान पर प्रभाव डालें।
        download:
          #Heading prompting users to download the mobile app
          heading: iNaturalist ऐप डाउनलोड करें
          #Subheading describing the two core benefits of the app
          subheading: वास्तविक समय की पहचान प्राप्त करें और विज्ञान में योगदान करें
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ डाउनलोड"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: दुनिया भर में प्रजातियों का अन्वेषण करें
          #Button / link to browse species without downloading
          button: अभी एक्सप्लोर करें
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "अंडर 13? डाउनलोड खोजें!"
          #Description of Seek's badge and challenge features
          body: बैज अर्जित करें और प्रजातियों का निरीक्षण करने के लिए चुनौतियों में भाग लें!
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ 5-सितारा समीक्षाएँ"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: हमारा मासिक न्यूज़लेटर प्राप्त करें!
          #Description of the newsletter's content
          body: iNaturalist समुदाय की कहानियों और खोजों से जुड़े रहें।
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist एक गैर-लाभकारी संगठन है जो विज्ञान और संरक्षण का समर्थन करता है।
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: आपका समर्थन इसे संभव बनाता है।
          #Call-to-action button for the donation section
          cta: अभी दान करें
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: सामान्य प्रश्न
          #FAQ: uploading existing photos — question
          upload_existing_question: क्या मैं अपने पास पहले से मौजूद फ़ोटो अपलोड कर सकता हूँ?
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            हाँ! जब तक आप मोटे तौर पर जानते हैं कि कोई फोटो कब और कहाँ ली गई थी, पुरानी तस्वीरों का स्वागत है।
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: iNaturalist टिप्पणियों के साथ विज्ञान कौन कर सकता है?
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            कोई भी! सभी iNaturalist अवलोकन खुले और स्वतंत्र रूप से उपलब्ध हैं - शोधकर्ताओं, संरक्षण चिकित्सकों और जिज्ञासु व्यक्तियों के लिए समान रूप से।
          #FAQ: research grade definition — question
          research_grade_question: '"अनुसंधान ग्रेड" का क्या अर्थ है?'
          #FAQ: research grade definition — answer
          research_grade_answer: >
            जब समुदाय एक पहचान पर सहमत होता है, तो एक अवलोकन "अनुसंधान ग्रेड" बन जाता है और वैश्विक वैज्ञानिक रिकॉर्ड में प्रवेश करता है। हर पहचान इसे वहां तक पहुंचाने में मदद कर सकती है।
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: क्या मुझे यह जानने की ज़रूरत है कि मैं क्या देख रहा हूँ?
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            बिलकुल नहीं! एक तस्वीर साझा करें, और प्रकृतिवादियों का एक वैश्विक समुदाय आपको इसे पहचानने में मदद कर सकता है।
          #FAQ: whether the app is required — question
          need_app_question: क्या मुझे ऐप का उपयोग करने की आवश्यकता है?
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            डेस्कटॉप पर, iNaturalist.org बहुत अच्छा काम करता है। मोबाइल डिवाइस पर, ऐप आपको सबसे अच्छा अनुभव देता है - विशेष रूप से चलते-फिरते प्रजातियों की पहचान करने के लिए।
