  views:
    announcements:
      locales_desc: |
        બહુવિધ પસંદ કરવા માટે CMD- અથવા SHIFT-ક્લિક કરો. "બધા" ને પસંદ કરવા અથવા બનાવતા નથી
        પસંદગી બધા વપરાશકર્તાઓને ઘોષણાને આને ધ્યાનમાં લીધા વગર બતાવશે
        લોકલે. વિસ્તાર વગર ભાષાને પસંદ કરવાનું *not* લક્ષ્ય હશે
        પ્રદેશો સાથેના લોકેલ્સ, દા.ત. જો તમે અંગ્રેજી પસંદ કરો તો તે દેખાશે નહિં
        એવા લોકો માટે જેમણે અંગ્રેજી (યુકે) પસંદ કર્યું છે.
      clients_desc: |
        બહુવિધ પસંદ કરવા માટે CMD- અથવા SHIFT-ક્લિક કરો. "બધા" ને પસંદ કરવા અથવા બનાવતા નથી
        પસંદગી બધા વપરાશકર્તાઓને ઘોષણાને આને ધ્યાનમાં લીધા વગર બતાવશે
        ક્લાયન્ટ.
      end_desc: |
        તમારા એકાઉન્ટ ટાઇમ ઝોનમાં સમય કે જે આ જાહેરાત બંધ થશે
        દેખાય છે. તમામ ટાઇમ ઝોનમાં લાગુ પડે છે, તેથી દરેક જણ જોવાનું બંધ કરશે
        તે જ સમયે, તેમના સ્થાનિક સમયની સાપેક્ષમાં નહીં.
      excludes_non_site_desc: |
        જો તમારી જાહેરાત કોઈ સાઇટને લક્ષ્ય બનાવે છે (જે મૂળભૂત છે જો તમે
        સાઇટ એડમિન), આમાં બધી સાઇટ્સને લક્ષ્ય બનાવતી ઘોષણાઓને બાકાત રાખશે
        આ પ્લેસમેન્ટ.
      ip_countries_desc: |
        બહુવિધ પસંદ કરવા માટે CMD- અથવા SHIFT-ક્લિક કરો. "બધા" ને પસંદ કરવા અથવા બનાવતા નથી
        પસંદગી બધા વપરાશકર્તાઓને ઘોષણાને આને ધ્યાનમાં લીધા વગર બતાવશે
        આઈ.પી. દેશ.
      exclude_ip_countries_desc: |
        મલ્ટિપલ પસંદ કરવા માટે CMD- અથવા SHIFT-ક્લિક કરો. પસંદ કરેલ દેશો બતાવવામાં આવશે નહિં
        ઘોષણા. જો IP દેશો પસંદ થયેલ હોય, તો પસંદ કરેલ IP દેશોને બાકાત રાખો
        પહેલામાંથી બાદબાકી કરવામાં આવશે.
      #Note about how the announcement last observation date property works
      last_observation_date_desc: |
        નોંધ લો કે વપરાશકર્તાએ તાજેતરમાં બનાવેલ ની બનાવટ તારીખ
        નિરીક્ષણ કેશ થયેલ છે, તેથી તેને લક્ષ્ય બનાવવા માટે થોડા કલાકો લાગી શકે છે
        અસર કરે છે
      observation_oauth_application_ids_desc: |
        બહુવિધ પસંદ કરવા માટે CMD- અથવા SHIFT-ક્લિક કરો. "બધા" ને પસંદ કરવા અથવા બનાવતા નથી
        પસંદગી બધા વપરાશકર્તાઓને ઘોષણાને આને ધ્યાનમાં લીધા વગર બતાવશે
        એપ્લિકેશન.
      site_ids_desc: |
        બહુવિધ પસંદ કરવા માટે CMD- અથવા SHIFT-ક્લિક કરો. "બધા" ને પસંદ કરવા અથવા બનાવતા નથી
        પસંદગી બધા વપરાશકર્તાઓને ઘોષણાને આને ધ્યાનમાં લીધા વગર બતાવશે
        સાઇટ જોડાણ.
      start_desc: |
        તમારા ખાતાના ટાઇમ ઝોનમાં સમય કે જે આ જાહેરાત શરૂ થશે
        દેખાય છે. તમામ ટાઇમ ઝોનમાં લાગુ પડે છે, તેથી દરેક જણ જોવાનું શરૂ કરશે
        તે જ સમયે, તેમના સ્થાનિક સમયની સાપેક્ષમાં નહીં.
      include_virtuous_tags_desc: |
        બહુવિધ પસંદ કરવા માટે CMD- અથવા SHIFT-ક્લિક કરો. "કોઈ પણ" પસંદ કરવું અથવા ન બનાવવું
        પસંદગી બધા વપરાશકર્તાઓને ઘોષણાને આને ધ્યાનમાં લીધા વગર બતાવશે
        તેમના સદ્ગુણી ટેગ્સ.
      exclude_virtuous_tags_desc: |
        બહુવિધ પસંદ કરવા માટે CMD- અથવા SHIFT-ક્લિક કરો. "કંઈ નહિં" અથવા બનાવી રહ્યા નથી તે પસંદ કરી રહ્યા છે
        પસંદગી બધા વપરાશકર્તાઓને ઘોષણાને આને ધ્યાનમાં લીધા વગર બતાવશે
        તેમના સદ્ગુણી ટેગ્સ.
      #Description of a group of options for targeting announcements based
      #on donation behavior
      target_users_by_donation_behavior: દાન વર્તણૂક દ્વારા વપરાશકર્તાઓને લક્ષ્ય બનાવો
      #Description of a group of options for targeting announcements based
      #on identification behavior
      target_users_by_identification_behavior: ઓળખ વર્તણૂક દ્વારા વપરાશકર્તાઓને લક્ષ્ય બનાવો
      #Description of a group of options for targeting announcements based
      #on observation behavior
      target_users_by_observation_behavior: નિરીક્ષણ વર્તણૂક દ્વારા વપરાશકર્તાઓને લક્ષ્ય બનાવો
      #Description of a group of options for targeting announcements based
      #miscellaneous user attributes
      target_users_by_other_attributes: અન્ય ગુણધર્મો દ્દારા વપરાશકર્તાઓને લક્ષ્ય બનાવો
    atlases:
      show:
        #Title for section describing atlases
        about_atlases: એટલાસીસ વિશે
        #Description of what atlases are
        atlases_convey_the_global_distribution: |
          એટલાસ ટેક્સોનનું વૈશ્વિક વિતરણ વ્યક્ત કરે છે. ક્યુરેટર્સ બનાવે છે
          એટલાસની રચનાને વ્યાખ્યાયિત કરીને અને ક્યુરેટ કરીને એટલાસ
          સૂચિબદ્ધ ટેક્સા જે તેને ચલાવે છે.
        #Label for a button that divides a place in an atlas into it's
        #constituent places. E.g. if the atlas for Red Fox contained Europe
        #you wanted to specify that Red Fox only occurs in Belgium and
        #France, you would "explode" Europe so you could choose Belgium and
        #France.
        explode_this_place: આ જગ્યાએ વિસ્ફોટ કરો
        #Label for a button that reunites places in an atlas into the place
        #that contains them. E.g. if an atlas contains Europe but it has
        #been "exploded" into its constituent countries, this would remove
        #those countries so the atlas would just contain Europe again.
        unexplode_this_place: આ જગ્યાનું વર્ણન દૂર કરો
        #Notice when an atlas has not been altered
        no_alterations_to_this_atlas_yet: આ એટલાસમાં હજુ સુધી કોઈ ફેરફાર થયો નથી
        #Title for a section showing recent alterations to an atlas
        recent_atlas_alterations: તાજેતરના એટલાસ ફેરફારો
        #Title for a section showing taxa that were recently added to a check
        #list
        recent_listed_taxon_additions: તાજેતરના લિસ્ટેડ ટેક્સોન ફેરફારો
        #Label for a button that shows taxa on checklists for a place
        show_listed_taxa: સૂચિબદ્ધ ટેક્સા બતાવો
        #Notice when an atlas is not active
        this_atlas_is_not_currently_active: આ એટલાસ હાલમાં સક્રિય નથી
        #Warning before removing a place from an atlas
        this_will_remove_this_taxon_and_all: |
          આ ટેક્સન અને તેના બધા વંશજોને ચેકલિસ્ટમાંથી દૂર કરશે
          આ સ્થળ અને તેમાં સમાવિષ્ટ કોઈપણ પ્રમાણભૂત સ્થાનો સાથે સંકળાયેલ છે. તે
          પૂર્વવત્ કરી શકાતું નથી. શું તમે ખરેખર આ કરવા માંગો છો?
        #Warning when there are observations outside of the places defined by
        #the atlas
        warning_there_are_observations_not_represented: |
          ચેતવણી: આ એટલાસ દ્વારા રજૂ થતા અવલોકનો નથી
    email_confirmation:
      click_here_to_resend_a_confirmation_email: પુષ્ટિ ઇમેઇલને ફરી મોકલવા માટે અંહિ ક્લિક કરો
      #message displayed after users trigger sending a email to confirm their email address
      confirmation_email_sent: ખાતરી ઇમેઇલ મોકલાયો
      #text displayed before showing a user the email address that we will
      #resend a confirmation email to
      here_is_the_email_colon: |
        અહીં ઇમેઇલ એડ્રેસ છે જેની પર અમે પુષ્ટિ મોકલીશું:
      #statement introducing suggestions for users that do no receive confirmation emails
      if_you_do_not_receive_the_email_here_are_tips_colon: |
        જો તમને ઇમેઇલ પ્રાપ્ત ન થતો હોય, તો અહીં કેટલીક ટિપ્સ આપી છે:
      #statement telling users to contact us if they are not receiving confirmation emails
      if_you_are_still_not_receiving_email_contact_us_html: જો તમને હજી પણ પુષ્ટિ ઇમેઇલ પ્રાપ્ત થતો ન હોય, તો કૃપા કરીને અમારો સંપર્ક કરો <a href="mailto:help+confirmation@inaturalist.org">help@inaturalist.org</a> જેથી અમે તમને મદદ કરી શકીએ.
      please_add_an_email_and_password: કૃપા કરીને ઇમેઇલ અને પાસવર્ડ ઉમેરો જેથી તમે તમારા ખાતાની ઍક્સેસ ગુમાવો નહીં
      please_click_the_link_sent_to_email_to_confirm_html: કૃપા કરીને પર મોકલવામાં આવેલી લિંક પર ક્લિક કરો <span class="email">%{email}</span> તમારા ઇમેઇલ એડ્રેસની પુષ્ટિ કરવા માટે.
      please_confirm_that_email_is_the_best_contact_html: કૃપા કરીને પુષ્ટિ કરો કે <span class="email">%{email}</span> તમારો સંપર્ક કરવાનો શ્રેષ્ઠ માર્ગ છે. #message requesting users confirm their email address to be able to engage with other users
      please_confirm_to_interact_and_access: અન્ય વપરાશકર્તાઓની સામગ્રી સાથે ક્રિયાપ્રતિક્રિયા કરવા અને અમુક પૃષ્ઠોને ઍક્સેસ કરવા માટે કૃપા કરીને તમારા ઇમેઇલ એડ્રેસની પુષ્ટિ કરો. #message requesting that a user confirm their email address, displaying the email to confirm
      please_confirm_your_email_address_html: કૃપા કરીને તમારા ઇમેઇલ એડ્રેસની પુષ્ટિ કરો <span class="email">%{email}</span>. #statement used in areas that might contain a form allowing users to add comments, etc. This # informs users they must confirm their email address if they want to be able to interact
      please_confirm_to_interact: અન્ય વપરાશકર્તાઓની સામગ્રી સાથે ક્રિયાપ્રતિક્રિયા કરવા માટે કૃપા કરીને તમારા ઇમેઇલ એડ્રેસની પુષ્ટિ કરો
      #statement used on pages that are not functional unless a user has confirmed their email address
      please_confirm_to_use_this_page: આ પૃષ્ઠનો ઉપયોગ કરવા માટે કૃપા કરીને તમારા ઇમેઇલ એડ્રેસની પુષ્ટિ કરો
      #tip for users who do not receive confirmation emails to check if their email view is filtered
      tips_check_email_filters: તમારા ઇનબોક્સમાંથી અમારા ઇમેઇલ્સ દૂર કરી શકે તેવા તમે બનાવેલા કોઇ પણ ફિલ્ટર્સ માટે તપાસ કરો #tip for users who do not receive confirmation emails to check their email spam folder
      tips_check_your_spam_folder: તમારા સ્પામ ફોલ્ડરને ચકાસો
      your_site_account_has_no_email: તમારું %{site_name} એકાઉન્ટ પાસે તેની સાથે સંકળાયેલ કોઈ ઇમેઇલ સરનામું નથી.
    guides:
      index:
        funding2_html: |
          માર્ગદર્શિકાઓના વિકાસ માટેનું ભંડોળ આના દ્વારા પૂરું પાડવામાં આવ્યું હતું
          <a href="http://eol.org"><img alt="Encyclopedia of Life" src="%{image_url}"></a>
    messages:
      index:
        #Users cannot create messages if they lack the criteria for
        #earning interaction privilege
        interaction_privilege_notice: |
          તમે તમારા ઇમેઇલની પુષ્ટિ કર્યા પછી તમે નવા સંદેશા મોકલી શકશો
          સરનામું. હમણાં માટે તમે વાંચી શકો છો અને અન્ય લોકો તમને મોકલેલા સંદેશનો જવાબ આપી શકો છો.
        #Users cannot create messages if they lack the criteria for
        #earning interaction or speech privilege
        privilege_notice: |
          તમે તમારા ઇમેઇલની પુષ્ટિ કર્યા પછી તમે નવા સંદેશા મોકલી શકશો
          સરનામું, અને ત્રણ ચકાસી શકાય તેવા અવલોકનો અથવા ત્રણ ઓળખો ઉમેરી
          બીજાઓ માટે. હમણાં માટે તમે વાંચી શકો છો અને અન્ય લોકો તમને મોકલેલા સંદેશનો જવાબ આપી શકો છો.
    observations:
      show:
        #One of a list of requirements an observation must meet to be in the Research Grade category
        dqa_help_research_grade_community_observation_html: |
          ધ <strong>કોમ્યુનિટી ટેક્સન અને ઓબ્ઝર્વેશન ટેક્સન મેળ ખાય છે</strong>
          (તે દુર્લભ પ્રસંગો માટે જ્યારે ઓબ્ઝર્વેશન ટેક્સોન વધુ હોઈ શકે છે.
          કોમ્યુનિટી ટેક્સન કરતાં વિશિષ્ટ)
        #One of a list of reasons for an observation to revert to Casual
        dqa_help_casual_not_accurate_evidence_html: |
          અવલોકન <strong>સજીવના સચોટ પુરાવા રજૂ કરતું નથી અથવા
          દ્રશ્ય</strong> (દા.ત. આર્ટિફિશિયલ ઇન્ટેલિજન્સનો ઉપયોગ ઉમેરવા, દૂર કરવા અથવા બદલવા માટે કરવામાં આવ્યો હતો
          છબી અથવા ધ્વનિમાં તત્વો. નોઇઝિંગ, ફોકસ સ્ટેકિંગ અથવા મેકિંગ
          સેન્સર ધૂળ દૂર કરવા જેવા નાના સુધારાઓ સામાન્ય રીતે ઠીક છે).
    sounds:
      show:
        #The user has been warned that an uploaded sound file has been noted as being problematic.
        #To bypass the warning, this additional text provides a link to the sound and guidance.
        view_original_html: |
          તમે મૂળ અહીં જોઈ શકો છો <a href="%{url}">%{url}</a>. કૃપા કરી
          જો આ અવાજ કરે તો ક copyrightપિરાઇટ ઉલ્લંઘન ફ્લેગને વણઉકેલાયેલી તરીકે છોડી દો
          કૉપિરાઇટનું ઉલ્લંઘન કરે છે.
    taxa:
      edit:
        #a message when you try to save major changes to a taoxn name
        you_can_only_make_minor_changes_to_the_species_epithet_directly_html: |
          તમે ફક્ત પ્રજાતિના વિશેષણમાં સીધા જ નાના ફેરફારો કરી શકો છો (દા.ત. લિંગ ફેરફારો, ખોટી જોડણી). એક ઉમેરો <a target="_blank" href="%{url}">ટેક્સોન સ્વેપ</a> જો તમને નામમાં અન્ય ફેરફારોની જરૂર હોય.
      show:
        site_curators_disabled_wikipedia_html: |
          સાઇટ ક્યુરેટરોએ બતાવવાનું નિષ્ક્રિય કર્યું છે <a href="%{url}">આ
          વિકિપીડિયામાંથી સમાવિષ્ટ</a>. તમે તેની પર પાનાંને સંપાદિત કરીને મદદ કરી શકો છો
          વિકિપીડિયા તેને આ ટેક્સન માટે યોગ્ય બનાવવા માટે, અથવા આને ફ્લેગ કરીને
          તેને સાઇટ ક્યુરેટર્સના ધ્યાન પર લાવવા માટે ટેક્સન.
      #error message when the Flickr tagger feature fails
      something_went_wrong_tags: |
        તે ટૅગ્સ પોસ્ટ કરવાનો પ્રયાસ કરતા કંઈક ખોટું થયું: %{message}
    taxon_changes:
      #warning when changing taxon change status from withdrawn back to draft
      are_you_sure_you_want_to_restore_this_taxon_change: શું તમે ખરેખર આ ટેક્સન ફેરફારને પુનર્સ્થાપિત કરવા માંગો છો?
      #warning when changing taxon change status from draft to withdrawn
      are_you_sure_you_want_to_withdraw_this_taxon_change: શું તમે ખરેખર આ ટેક્સન ફેરફાર પાછો ખેંચવા માંગો છો?
      #act of changing a taxon change status from withdrawn back to draft meaning reinstated as a draft
      restore: પુન:સંગ્રહ કરો
      #in process of changing a taxon change status from withdrawn back to draft meaning reinstated as a draft
      restoring: પુન:સંગ્રહ કરી રહ્યા છીએ
      #act of changing a taxon change status from draft to withdrawn meaning abandoned
      withdraw: ઉપાડો
      #state of an abandoned taxon change
      withdrawn: પાછી ખેંચી લેવામાં આવી છે
      #state of a committed taxon change
      committed: પ્રતિબદ્ધ
      #state of a draft taxon change
      draft: ડ્રાફ્ટ
      #the status of a taxon change: draft, withdrawn or committed
      status: પરિસ્થિતિ
    users:
      edit:
        block_desc_blocking_someone_prevents: |
          કોઈને બ્લોક કરવાથી તે તમને મેસેજ કરતા અટકાવે છે, તમારા પર કોમેન્ટ કરતા અટકાવે છે
          નિરીક્ષણો, તમારા નિરીક્ષણોને ઓળખવા, અને અન્યથા ક્રિયાપ્રતિક્રિયા
          તમારી સાથે આના પર %{site_name}. તે તમારામાંથી તેમના નિરીક્ષણોને પણ દૂર કરે છે
          શોધ પરિણામો અને તેમની શોધમાંથી તમારાં નિરીક્ષણોને દૂર કરે છે
          પરિણામો. જો કે, તે તમને તેમના માટે અદૃશ્ય બનાવતું નથી. તેઓ કરી શકે છે
          હજી પણ તમારા નિરીક્ષણો શોધો અને તમારી પ્રોફાઇલ જુઓ, તેઓ ફક્ત કરી શકતા નથી
          તમારી સાથે વાતચીત કરો.
        block_desc_blocking_is_for_situations: |
          અવરોધ એ એવી પરિસ્થિતિઓ માટે છે જ્યાં તમે ફક્ત સાથે મળી શકતા નથી
          કોઈક અને તેઓ તમારા શ્રેષ્ઠ પ્રયત્નો છતાં, તમને એકલા છોડશે નહીં
          વિવાદોનું સમાધાન સંસ્કારી રીતે કરવું. તેનાથી છુપાવવાનો આ કોઈ રસ્તો નથી
          લોકો, એવા લોકોની એકરૂપતા અટકાવવા માટે જેમના અભિપ્રાયો તમે
          વિશ્વાસ કરશો નહીં, અથવા કોમ્યુનિટી આઇડીમાંથી બહાર નીકળવાનું પસંદ કરો (ત્યાં એક બીજું પણ છે
          તેના માટે સેટિંગ). આમ, બ્લોકિંગ બંને રીતે કામ કરે છેઃ જા તમે બ્લોક કરો તો
          કોઈક, તેઓ તમારી સાથે વાતચીત કરી શકતા નથી, પરંતુ તમે વાતચીત પણ કરી શકતા નથી
          તેમની સાથે. જો તમે કોઈને તમારી ઓળખતા અટકાવવા માટે તેનો દુરુપયોગ કરો છો
          નિરીક્ષણો, તમે તેમની ઓળખ કરતા પણ તમારી જાતને અટકાવો છો
          નિરીક્ષણો.
        block_desc_you_can_only_block_html: |
          તમે ફક્ત ત્રણ લોકોને જ બ્લોક કરી શકો છો. અમને લાગે છે કે આ વાજબી છે
          નંબર કે જે એવા લોકોને સમાવે છે કે જેમને જ્યારે બ્લોક કરવાની જરૂર હોય
          અવરોધિત કરવાના દુરૂપયોગને અટકાવે છે. જો તમને લાગે કે તમારે વધુ બ્લોક કરવાની જરૂર છે
          લોકો, મહેરબાની કરીને <a href="mailto:%{help_email}">અમારો સંપર્ક કરો</a>.
        block_desc_there_are_two_exceptions: |
          એવી બે પરિસ્થિતિઓ છે જ્યાં અવરોધિત કરવાથી ક્રિયાપ્રતિક્રિયાને અટકાવી શકાતી નથી:
        errors:
          #error message when a user attempts to update their profile picture using
          #an image that has an unsupported file type
          unsupported_file_type: ફાઇલ પ્રકાર આધારભૂત નથી. અમે JPG, PNG અને GIF ને સ્વીકારીએ છીએ
        this_only_applies_to_traditional_projects2: |
          આ માત્ર પરંપરાગત પ્રોજેક્ટ્સને જ લાગુ પડે છે. તમે નિરીક્ષણોને નહિં સમાવી શકો
          સંગ્રહ અથવા છત્રી પ્રોજેક્ટ્સમાંથી, જે આવશ્યકપણે સાચવવામાં આવે છે.
          તમે વધુ વાંચી શકો છો
          <a href="https://help.inaturalist.org/support/solutions/articles/151000176472">અહીં</a>.
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: જ્યાં તમારી જિજ્ઞાસા વિજ્ઞાનમાં ફાળો આપે છે.
          #Hero subheadline describing the core value proposition
          #TODO: test that line break here doesn't cause line break
          subheadline: >
            પૃથ્વી પરના જીવનના જીવંત એટલાસમાં ઉમેરતી વખતે છોડ, પ્રાણીઓ, ફૂગ અને વધુને ઓળખો.
          #Primary call-to-action button in the hero section
          cta_join: સમુદાયમાં જોડાઓ
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: મફત, બિનનફાકારક, સમુદાય-સંચાલિત.
        features:
          #Section label introducing the three core user actions
          intro: "iNaturalist સાથે, તમે કરી શકો છો:"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: છોડ, પ્રાણીઓ, ફૂગ અને વધુ
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: તમે વિશ્વભરમાં જોયેલી પ્રજાતિઓ
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: વાસ્તવિક વિજ્ઞાન તરફ
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: નજીકની પ્રકૃતિ
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: પ્રકૃતિવાદીઓના વૈશ્વિક સમુદાય તરફથી
        stories:
          #Section heading for real-world stories powered by community science
          heading: સામુદાયિક વિજ્ઞાનની શક્તિ
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: દ્વારા જોયેલ %{user} માં %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: લાંબા સમયથી ખોવાયેલી પ્રજાતિઓને ફરીથી શોધી રહ્યા છે
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            ધ %{moth_common_name} શલભ દાયકાઓથી જોવા મળ્યો ન હતો અને એક સમયે લુપ્ત થઈ ગયો હોવાનું માનવામાં આવતું હતું - જ્યાં સુધી ન્યુઝીલેન્ડના એક પ્રવાસીએ તેને અકસ્માત દ્વારા શોધી કાઢ્યો ન હતો.
          #Heading for the story about a new-to-science mantis species
          mantis_heading: નવી વિજ્ઞાન પ્રજાતિઓની શોધ
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">ઈનિમિયા નાટ</span> - સંક્ષિપ્તમાં <span class="italic">I. nat</span> - ઓસ્ટ્રેલિયામાં એક મહિલા દ્વારા તેના પડોશમાં ચાલતી એક નવી વિજ્ઞાન મેન્ટિસ પ્રજાતિ છે.
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: સ્થાનિક ઇકોસિસ્ટમનું રક્ષણ કરવું
          #Body text for the amphibian protection story
          amphibian_body: >
            કેલિફોર્નિયામાં સ્થાનિક સ્વયંસેવકોનું એક જૂથ વ્યસ્ત રસ્તાને પાર કરતા સ્થળાંતર કરતા ઉભયજીવીઓને બચાવવા માટે iNaturalist દ્વારા ભેગા થયું હતું.
          #Link below the stories to read more community science stories
          read_more: વધુ વાર્તાઓ વાંચો
        observation:
          #Heading for the sample observation section
          heading: દરેક અવલોકન એક વાર્તા કહે છે
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: જૈવવિવિધતા વિજ્ઞાનમાં યોગદાન આપતા અવલોકનો
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: વિશ્વભરમાં દસ્તાવેજીકરણ થયેલ પ્રજાતિઓ
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: આઇનેચરલિસ્ટ ડેટાને ટાંકતા કાગળો
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: સમુદાયના વૈજ્ઞાનિકો દ્વારા શોધાયેલી અથવા ફરીથી શોધાયેલી પ્રજાતિઓ
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            એપ્લિકેશન ખોલો અને કોઈપણ જંગલી છોડ, પ્રાણી, ફૂગ અથવા અન્ય સજીવનો ફોટોગ્રાફ કરો - તમારા પડોશમાંથી અથવા વિશ્વમાં ક્યાંય.
          #Step 2 description — explaining AI and community identification
          step2_body: >
            એપ્લિકેશન તરત જ ઓળખ સૂચવે છે, અને પ્રકૃતિવાદીઓનો વૈશ્વિક સમુદાય તેની પુષ્ટિ કરે છે અથવા શુદ્ધ કરે છે.
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            તમારું અવલોકન ખુલ્લા ડેટા બની જાય છે - વિશ્વભરના વૈજ્ઞાનિકો, સંરક્ષણવાદીઓ અને સંશોધકો દ્વારા ઉપયોગમાં લેવાય છે.
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            પ્રકૃતિ પહેલા કરતા વધુ ઝડપથી બદલાઈ રહી છે, તેથી આપણે જરૂર છે <span class="underline">તમે</span> શું રહે છે તે રેકોર્ડ કરવામાં મદદ કરવા માટે.
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            તે મને વિશ્વભરના વિવિધ લોકો સાથે વાતચીત કરવાની તક આપવા ઉપરાંત, પ્રજાતિઓની ઓળખમાં ખરેખર મદદ કરી છે.
          #Job title and location of the testimonial author (last name Gube)
          gube_title: દરિયાઇ સંરક્ષણવાદી અને અંડરવોટર ફોટોગ્રાફર, કેન્યા
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            આઇનેચરલિસ્ટ અન્ડરસ્ટડી ટેક્સા પર ઘણા નવા અને આકર્ષક સંશોધનનો દરવાજો ખોલે છે. મારા મતે, આ પ્લેટફોર્મ ઇકોલોજીકલ સાયન્સની કટીંગ ધાર છે.
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: ઓવફ્લી એલએલસી, યુએસએ ખાતે ફીલ્ડ માર્ગદર્શિકા લેખક
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            iNaturalist અને ઓળખકર્તાઓનો સમર્પિત સમુદાય મારા સંશોધનમાં અમૂલ્ય સંસાધન બન્યો. તેણે મારા વર્તમાન કાર્યનો પાયો નાખવામાં મદદ કરી.
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: જૈવવિવિધતા સંશોધક, શ્રીલંકા
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist એ એક શક્તિશાળી સાધન છે જે લોકો, પ્રકૃતિ અને જ્ઞાનને જોડે છે. હું એક દુર્લભ પ્રજાતિનો ફોટોગ્રાફ કરી શકું છું, અથવા તે પણ એક કે જેનું હજી સુધી વર્ણન કરવામાં આવ્યું નથી, અને તે જ સમયે, હું આપણા કુદરતી વારસાને બચાવવામાં ફાળો આપું છું.
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: એન્વાયર્નમેન્ટલ ટેકનિશિયન અને શોખ ફોટોગ્રાફર, બ્રાઝિલ
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            તમે વિશ્વમાં ક્યાં હોવ તે મહત્વનું નથી, પછી ભલે તમારી પાસે પીએચડી હોય અથવા ફક્ત બહારના પ્રેમને પ્રેમ કરો, આઇનેચરલિસ્ટ તમને પ્રકૃતિ અને ઘણા સાથી પ્રકૃતિવાદીઓની નજીક લાવશે.
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: જીવવિજ્ઞાની, મેક્સિકો
        everyone:
          #Heading for the broad audience section
          heading: દરેક વ્યક્તિ પ્રકૃતિવાદી છે
          #Description inviting anyone who has been curious about a living thing
          body: >
            જો તમે ક્યારેય જીવંત વસ્તુને નજીકથી જોઈ છે અને આશ્ચર્ય પામ્યું છે કે તે શું છે, તો iNaturalist તમારા માટે છે.
          #Heading for the impact sub-section
          impact_heading: તમે પ્રભાવ પાડી શકો છો
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            તમે શેર કરો છો તે દરેક ફોટો વૈશ્વિક વૈજ્ઞાનિક રેકોર્ડનો ભાગ બની જાય છે જેના પર વિશ્વભરના સંશોધકો આધાર રાખે છે.
          #Heading for the community reputation sub-section
          community_heading: '"ઓનલાઇન સૌથી સરસ સ્થળ"'
          #Description of the welcoming community aspect
          community_body: >
            ઓળખ માટે આવો, સમુદાય માટે રહો અને વિજ્ઞાન પર અસર કરો.
        download:
          #Heading prompting users to download the mobile app
          heading: આઇનેચરલિસ્ટ એપ્લિકેશન ડાઉનલોડ કરો
          #Subheading describing the two core benefits of the app
          subheading: વાસ્તવિક સમયની ઓળખ મેળવો અને વિજ્ઞાનમાં યોગદાન આપો
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ ડાઉનલોડ્સ"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: વિશ્વભરમાં પ્રજાતિઓનું અન્વેષણ કરો
          #Button / link to browse species without downloading
          button: હવે અન્વેષણ કરો
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "13 વર્ષથી નીચે? સીક ડાઉનલોડ કરો!"
          #Description of Seek's badge and challenge features
          body: બેજ કમાય અને પ્રજાતિઓનું અવલોકન કરવા માટે પડકારોમાં ભાગ લો!
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ 5-સ્ટાર સમીક્ષાઓ"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: અમારું માસિક ન્યૂઝલેટર મેળવો!
          #Description of the newsletter's content
          body: આઇનેચરલિસ્ટ સમુદાયની વાર્તાઓ અને શોધો સાથે જોડાયેલા રહો.
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist એ એક બિનનફાકારક સંસ્થા છે જે વિજ્ઞાન અને સંરક્ષણને ટેકો આપે છે.
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: તમારો ટેકો તે શક્ય બનાવે છે.
          #Call-to-action button for the donation section
          cta: હવે દાન કરો
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: FAQs
          #FAQ: uploading existing photos — question
          upload_existing_question: શું હું મારી પાસે પહેલાથી જ ફોટા અપલોડ કરી શકું છું?
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            હા! જ્યાં સુધી તમે લગભગ જાણો છો કે ફોટો ક્યારે અને ક્યાં લેવામાં આવ્યો હતો, જૂના ફોટા આવકાર્ય છે.
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: આઇનેચરલિસ્ટ નિરીક્ષણો સાથે વિજ્ઞાન કોણ કરી શકે છે?
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            કોઈપણ! બધા iNaturalist નિરીક્ષણો ખુલ્લા અને મુક્ત રીતે ઉપલબ્ધ છે - સંશોધકો, સંરક્ષણ પ્રેક્ટિશનરો અને જિજ્ઞાસુ વ્યક્તિઓ માટે.
          #FAQ: research grade definition — question
          research_grade_question: '"સંશોધન ગ્રેડ" નો અર્થ શું છે?'
          #FAQ: research grade definition — answer
          research_grade_answer: >
            જ્યારે સમુદાય ઓળખ પર સંમત થાય છે, ત્યારે અવલોકન "સંશોધન ગ્રેડ" બની જાય છે અને વૈશ્વિક વૈજ્ઞાનિક રેકોર્ડમાં પ્રવેશ કરે છે. દરેક ઓળખ તેને ત્યાં પહોંચવામાં મદદ કરી શકે છે.
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: શું મારે જાણવાની જરૂર છે કે હું શું જોઈ રહ્યો છું?
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            બિલકુલ નહીં! એક ફોટો શેર કરો, અને પ્રકૃતિવાદીઓનો વૈશ્વિક સમુદાય તમને તેને ઓળખવામાં મદદ કરી શકે છે.
          #FAQ: whether the app is required — question
          need_app_question: શું મારે એપ્લિકેશનનો ઉપયોગ કરવાની જરૂર છે?
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            ડેસ્કટોપ પર, iNaturalist.org સરસ કામ કરે છે. મોબાઇલ ઉપકરણ પર, એપ્લિકેશન તમને શ્રેષ્ઠ અનુભવ આપે છે - ખાસ કરીને સફરમાં પ્રજાતિઓને ઓળખવા માટે.
  number:
    format:
      significant: false
      strip_insignificant_zeros: false
    human:
      format:
        significant: true
        strip_insignificant_zeros: true
  time:
    formats:
      #See https://ruby-doc.org/stdlib-2.6.1/libdoc/date/rdoc/Date.html#method-i-strftime for formatting codes. Use %=B or %=b for lowercase months.
      short: '%-d %b %I:%M %p'
      #See https://ruby-doc.org/stdlib-2.6.1/libdoc/date/rdoc/Date.html#method-i-strftime for formatting codes. Use %=B or %=b for lowercase months.
      short_with_year: '%-d %b %Y %I:%M %p'
  activerecord:
