              #Taxon changes cannot involve the Life taxon, which is the root of the taxonomic tree
              life_taxon_cannot_be_involved: લાઇફ ટેક્સોનને ટેક્સોન ફેરફારોમાં સામેલ કરી શકાતું નથી
