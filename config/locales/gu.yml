        #Start of a date range that the viewer must not have donated in to see the announcement
        exclude_donor_start_date: દાતા શરૂઆત તારીખને સમાવો નહિં
        #End of a date range that the viewer must not have donated in to see the announcement
        exclude_donor_end_date: દાતાની અંતિમ તારીખને સમાવો નહિં
        excludes_non_site: આ સ્થાનમાં અન્ય ઘોષણાઓને છુપાવો કે જેની પાસે સાઇટ ID નથી
        #iNat client applications that the user must not have made an observation
        #with to see the announcement
        exclude_observation_oauth_application_ids: નિરીક્ષકોને એપ્લિકેશનોમાંથી સમાવો નહિં
        #start of a date range that the viewer must have donated in to see the announcement
        include_donor_start_date: દાતાની શરૂઆતની તારીખને સમાવો
        #End of a date range that the viewer must have donated in to see the announcement
        include_donor_end_date: દાતાની અંતિમ તારીખને સમાવો
        #iNat client applications that the user must have made an observation
        #with to see the announcement
        include_observation_oauth_application_ids: એપ્લિકેશનમાંથી નિરીક્ષકોને સામેલ કરો
        #List of countries that the viewer's IP address can come from to see the announcement
        ip_countries: IP દેશો
        #Start of a date range that includes the viewer's most recent observation
        last_observation_start_date: તાજેતરની ઓબ્સ શરૂઆતની તારીખ
        #end of a date range that includes the viewer's most recent observation
        last_observation_end_date: તાજેતરની ઓબ્સની અંતિમ તારીખ
        #Maximum number of identifications the viewer must have added for others to see the announcement
        max_identifications: મહત્તમ ઓળખાણો
        #Minimum number of identifications the viewer must have added for others to see the announcement
        min_identifications: ન્યૂનત્તમ ઓળખાણો
        #Maximum number of observations the viewer must have added for others to see the announcement
        max_observations: મહત્તમ નિરીક્ષણો
        #Minimum number of observations the viewer must have added for others to see the announcement
        min_observations: ન્યૂનત્તમ અવલોકનો
        #Place in iNat where this announcement will be shown, e.g. web dashboard, mobile home, etc
        placement: સ્થાન
        #Preference for an announcement that is only shown to the user who created the announcement
        target_creator: લક્ષ્ય બનાવનાર (ચકાસણી માટે)
        #Whether or not the announcement is shown to logged in users
        target_logged_in: લક્ષ્ય પ્રવેશેલ છે
        #Earliest date the viewer can have signed up to see the announcement
        user_created_start_date: શરુઆતની વપરાશકર્તા સાઇન અપ તારીખ
        #Latest date the viewer can have signed up to see the announcement
        user_created_end_date: વપરાશકર્તા સાઇન અપ કરવાની છેલ્લી તારીખ
      taxon:
        #Boolean attribute that controls whether Wikipedia content is shown for this taxon
        shows_wikipedia: વિકિપીડિયા બતાવે છે
      user:
