  we_also_support3: |
    Chúng tôi cũng hỗ trợ nhập ảnh từ <a href="http://flickr.com">Flickr</a>.
  views:
    announcements:
      locales_desc: |
        CMD- hoặc SHIFT-nhấp để chọn nhiều. Chọn "Tất cả" hoặc không thực hiện
        một lựa chọn sẽ hiển thị thông báo cho tất cả người dùng bất kể
        Locale. Chọn một ngôn ngữ không có khu vực sẽ *không* nhắm mục tiêu
        locale có vùng, ví dụ: nếu bạn chọn tiếng Anh, nó sẽ không xuất hiện
        dành cho những người đã chọn tiếng Anh (Anh).
      clients_desc: |
        CMD- hoặc SHIFT-nhấp để chọn nhiều. Chọn "Tất cả" hoặc không thực hiện
        một lựa chọn sẽ hiển thị thông báo cho tất cả người dùng bất kể
        khách hàng.
      end_desc: |
        Thời gian trong múi giờ tài khoản của bạn mà thông báo này sẽ dừng lại
        Xuất hiện. Áp dụng trên các múi giờ nên mọi người sẽ ngừng nhìn thấy
        nó cùng một lúc, không liên quan đến giờ địa phương của họ.
      excludes_non_site_desc: |
        Nếu thông báo của bạn nhắm mục tiêu đến một trang web (đây là giá trị mặc định nếu bạn là
        Quản trị viên trang web), điều này sẽ loại trừ các thông báo nhắm mục tiêu đến tất cả các trang web trong
        vị trí này.
      exclude_ip_countries_desc: |
        CMD- hoặc SHIFT-nhấp để chọn nhiều. Các quốc gia được chọn sẽ không được hiển thị
        thông báo. Nếu các quốc gia IP được chọn, hãy chọn Loại trừ các quốc gia IP
        sẽ bị trừ khỏi cái trước.
      observation_oauth_application_ids_desc: |
        CMD- hoặc SHIFT-nhấp để chọn nhiều. Chọn "Tất cả" hoặc không thực hiện
        một lựa chọn sẽ hiển thị thông báo cho tất cả người dùng bất kể
        App.
    email_confirmation:
      click_here_to_resend_a_confirmation_email: Nhấp vào đây để gửi lại email xác nhận
      #message displayed after users trigger sending a email to confirm their email address
      confirmation_email_sent: Email xác nhận đã gửi
      #text displayed before showing a user the email address that we will
      #resend a confirmation email to
      here_is_the_email_colon: |
        Đây là địa chỉ email chúng tôi sẽ gửi xác nhận đến:
      #statement introducing suggestions for users that do no receive confirmation emails
      if_you_do_not_receive_the_email_here_are_tips_colon: |
        Nếu bạn không nhận được email, đây là một số mẹo:
      #statement telling users to contact us if they are not receiving confirmation emails
      if_you_are_still_not_receiving_email_contact_us_html: Nếu bạn vẫn không nhận được email xác nhận, vui lòng liên hệ với chúng tôi theo địa chỉ <a href="mailto:help+confirmation@inaturalist.org">help@inaturalist.org</a> Vì vậy, chúng tôi có thể hỗ trợ bạn.
      please_add_an_email_and_password: Vui lòng thêm email và mật khẩu để bạn không bị mất quyền truy cập vào tài khoản của mình
      please_click_the_link_sent_to_email_to_confirm_html: Vui lòng nhấp vào liên kết được gửi đến <span class="email">%{email}</span> để xác nhận địa chỉ email của bạn.
      please_confirm_that_email_is_the_best_contact_html: Vui lòng xác nhận rằng <span class="email">%{email}</span> là cách tốt nhất để liên hệ với bạn. #message requesting users confirm their email address to be able to engage with other users
      please_confirm_to_interact_and_access: Vui lòng xác nhận địa chỉ email của bạn để tương tác với nội dung của người dùng khác và truy cập một số trang nhất định. #message requesting that a user confirm their email address, displaying the email to confirm
      please_confirm_your_email_address_html: Vui lòng xác nhận địa chỉ email của bạn <span class="email">%{email}</span>. #statement used in areas that might contain a form allowing users to add comments, etc. This # informs users they must confirm their email address if they want to be able to interact
      please_confirm_to_interact: Vui lòng xác nhận địa chỉ email của bạn để tương tác với nội dung của người dùng khác
      #statement used on pages that are not functional unless a user has confirmed their email address
      please_confirm_to_use_this_page: Vui lòng xác nhận địa chỉ email của bạn để sử dụng trang này
      #tip for users who do not receive confirmation emails to check if their email view is filtered
      tips_check_email_filters: Kiểm tra bất kỳ bộ lọc nào bạn đã thực hiện có thể xóa email của chúng tôi khỏi hộp thư đến của bạn #tip for users who do not receive confirmation emails to check their email spam folder
      tips_check_your_spam_folder: Kiểm tra thư mục thư rác của bạn
      your_site_account_has_no_email: Của bạn %{site_name} không có địa chỉ email nào được liên kết với nó.
    guides:
      index:
        funding2_html: |
          Tài trợ cho việc phát triển Hướng dẫn được cung cấp bởi
          <a href="http://eol.org"><img alt="Encyclopedia of Life" src="%{image_url}"></a>
    messages:
      index:
        #Users cannot create messages if they lack the criteria for
        #earning interaction privilege
        interaction_privilege_notice: |
          Bạn sẽ có thể gửi thư mới sau khi xác nhận email của mình
          địa chỉ. Hiện tại, bạn có thể đọc và trả lời tin nhắn mà người khác gửi cho bạn.
        #Users cannot create messages if they lack the criteria for
        #earning interaction or speech privilege
        privilege_notice: |
          Bạn sẽ có thể gửi thư mới sau khi xác nhận email của mình
          địa chỉ và thêm ba quan sát có thể kiểm chứng hoặc ba nhận dạng
          cho những người khác. Hiện tại, bạn có thể đọc và trả lời tin nhắn mà người khác gửi cho bạn.
    observations:
      show:
        #One of a list of requirements an observation must meet to be in the Research Grade category
        dqa_help_research_grade_community_observation_html: |
          Các <strong>Đơn vị phân loại cộng đồng và Đơn vị phân loại quan sát phù hợp</strong>
          (đối với những dịp hiếm hoi khi Đơn vị phân loại quan sát có thể nhiều hơn
          cụ thể hơn là Đơn vị phân loại cộng đồng)
        #One of a list of reasons for an observation to revert to Casual
        dqa_help_casual_not_accurate_evidence_html: |
          Quan sát <strong>không đưa ra bằng chứng chính xác về sinh vật hoặc
          cảnh</strong> (ví dụ: trí tuệ nhân tạo được sử dụng để thêm, xóa hoặc thay thế
          trong hình ảnh hoặc âm thanh. Khử nhiễu, xếp chồng tiêu điểm hoặc tạo
          các bản sửa lỗi nhỏ như loại bỏ bụi cảm biến thường ổn).
    sounds:
      show:
        #The user has been warned that an uploaded sound file has been noted as being problematic.
        #To bypass the warning, this additional text provides a link to the sound and guidance.
        view_original_html: |
          Bạn có thể xem bản gốc tại <a href="%{url}">%{url}</a>. Vui lòng
          Để cờ vi phạm bản quyền là chưa được giải quyết nếu âm thanh này không được giải quyết
          vi phạm bản quyền.
    taxa:
      edit:
        #a message when you try to save major changes to a taoxn name
        you_can_only_make_minor_changes_to_the_species_epithet_directly_html: |
          Bạn chỉ có thể thực hiện các thay đổi nhỏ đối với biệt hiệu loài trực tiếp (ví dụ: thay đổi giới tính, sai chính tả). Thêm một <a target="_blank" href="%{url}">Hoán đổi đơn vị phân loại</a> nếu bạn cần những thay đổi khác đối với tên.
      #error message when the Flickr tagger feature fails
      something_went_wrong_tags: |
        Đã xảy ra sự cố khi cố gắng đăng các thẻ đó: %{message}
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: Nơi mà sự tò mò của bạn đóng góp cho khoa học.
          #Hero subheadline describing the core value proposition
          #TODO: test that line break here doesn't cause line break
          subheadline: >
            Xác định thực vật, động vật, nấm, v.v. đồng thời thêm vào tập bản đồ sống động trên Trái đất.
          #Primary call-to-action button in the hero section
          cta_join: Tham gia cộng đồng
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: Miễn phí, phi lợi nhuận, hỗ trợ cộng đồng.
        features:
          #Section label introducing the three core user actions
          intro: "Với iNaturalist, bạn có thể:"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: Thực vật, động vật, nấm, v.v.
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: Các loài bạn đã thấy trên toàn thế giới
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: đến khoa học thực tế
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: thiên nhiên gần đó
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: từ cộng đồng các nhà tự nhiên học toàn cầu
        stories:
          #Section heading for real-world stories powered by community science
          heading: Sức mạnh của khoa học cộng đồng
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: Được xem bởi %{user} trong %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: Khám phá lại các loài đã mất từ lâu
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            Thuộc tính %{moth_common_name} Bướm đêm đã không được phát hiện trong nhiều thập kỷ và từng được cho là đã tuyệt chủng - cho đến khi một khách du lịch ở New Zealand tình cờ phát hiện ra nó.
          #Heading for the story about a new-to-science mantis species
          mantis_heading: Khám phá các loài mới đối với khoa học
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">Inimia nat</span> — viết tắt là <span class="italic">I. nat</span> - là một loài bọ ngựa mới được khoa học tìm thấy bởi một phụ nữ ở Úc đang đi dạo trong khu phố của cô ấy.
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: Bảo vệ hệ sinh thái địa phương
          #Body text for the amphibian protection story
          amphibian_body: >
            Một nhóm tình nguyện viên địa phương ở California đã cùng nhau thông qua iNaturalist để bảo vệ động vật lưỡng cư di cư băng qua một con đường đông đúc.
          #Link below the stories to read more community science stories
          read_more: Đọc thêm câu chuyện
        observation:
          #Heading for the sample observation section
          heading: Mỗi quan sát đều kể một câu chuyện
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: Quan sát đóng góp cho khoa học đa dạng sinh học
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: Các loài được ghi nhận trên toàn cầu
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: các bài báo trích dẫn dữ liệu của iNaturalist
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: các loài được phát hiện hoặc tái khám phá bởi các nhà khoa học cộng đồng
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            Mở ứng dụng và chụp ảnh bất kỳ loài thực vật hoang dã, động vật, nấm hoặc sinh vật nào khác - từ khu vực lân cận của bạn hoặc bất kỳ nơi nào trên thế giới.
          #Step 2 description — explaining AI and community identification
          step2_body: >
            Ứng dụng đề xuất nhận dạng ngay lập tức và một cộng đồng các nhà tự nhiên học toàn cầu xác nhận hoặc tinh chỉnh nó.
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            Quan sát của bạn trở thành dữ liệu mở - được sử dụng bởi các nhà khoa học, nhà bảo tồn và nhà nghiên cứu trên toàn thế giới.
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            Thiên nhiên đang thay đổi nhanh hơn bao giờ hết, vì vậy chúng ta cần <span class="underline">bạn</span> để giúp ghi lại những gì sống ở đâu.
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            Nó thực sự giúp tôi xác định loài, ngoài ra còn cho tôi cơ hội tương tác với những người khác nhau trên khắp thế giới.
          #Job title and location of the testimonial author (last name Gube)
          gube_title: Nhà bảo tồn biển và nhiếp ảnh gia dưới nước, Kenya
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            iNaturalist mở ra cánh cửa cho rất nhiều nghiên cứu mới và thú vị về các đơn vị phân loại chưa được nghiên cứu. Theo tôi, nền tảng này là tiên tiến của khoa học sinh thái.
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: Hướng dẫn thực địa Tác giả tại Owlfly LLC, Hoa Kỳ
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            iNaturalist và cộng đồng nhận dạng tận tâm của nó đã trở thành một nguồn tài nguyên vô giá trong những khám phá của tôi. Nó đã giúp đặt nền móng cho công việc hiện tại của tôi.
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: Nhà nghiên cứu đa dạng sinh học, Sri Lanka
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist là một công cụ mạnh mẽ kết nối con người, thiên nhiên và kiến thức. Tôi có thể chụp một loài quý hiếm, hoặc thậm chí một loài chưa được mô tả, đồng thời, tôi góp phần bảo tồn di sản thiên nhiên của chúng ta.
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: Kỹ thuật viên môi trường và nhiếp ảnh gia sở thích, Brazil
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            Bất kể bạn ở đâu trên thế giới, cho dù bạn có bằng tiến sĩ hay chỉ yêu thích hoạt động ngoài trời, iNaturalist sẽ đưa bạn đến gần hơn với thiên nhiên và nhiều nhà tự nhiên học đồng nghiệp.
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: Nhà sinh vật học, Mexico
        everyone:
          #Heading for the broad audience section
          heading: Mọi người đều là một nhà tự nhiên học
          #Description inviting anyone who has been curious about a living thing
          body: >
            Nếu bạn đã từng quan sát kỹ một thứ gì đó sống động và tự hỏi nó là gì, iNaturalist là dành cho bạn.
          #Heading for the impact sub-section
          impact_heading: Bạn có thể tạo ra tác động
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            Mỗi bức ảnh bạn chia sẻ đều trở thành một phần của hồ sơ khoa học toàn cầu mà các nhà nghiên cứu trên toàn thế giới phụ thuộc vào.
          #Heading for the community reputation sub-section
          community_heading: '"Nơi đẹp nhất trực tuyến"'
          #Description of the welcoming community aspect
          community_body: >
            Hãy đến để nhận dạng, ở lại vì cộng đồng và tác động đến khoa học.
        download:
          #Heading prompting users to download the mobile app
          heading: Tải xuống ứng dụng iNaturalist
          #Subheading describing the two core benefits of the app
          subheading: Nhận dạng thời gian thực và đóng góp cho khoa học
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ Tải xuống"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: Khám phá các loài trên toàn thế giới
          #Button / link to browse species without downloading
          button: Khám phá ngay
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "Dưới 13 tuổi? Tải Seek!"
          #Description of Seek's badge and challenge features
          body: Kiếm huy hiệu và tham gia vào các thử thách để quan sát các loài!
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ Đánh giá 5 sao"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: Nhận bản tin hàng tháng của chúng tôi!
          #Description of the newsletter's content
          body: Luôn kết nối với những câu chuyện và khám phá từ cộng đồng iNaturalist.
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist là một tổ chức phi lợi nhuận hỗ trợ khoa học và bảo tồn.
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: Sự hỗ trợ của bạn làm cho điều đó trở nên khả thi.
          #Call-to-action button for the donation section
          cta: Quyên góp ngay
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: Câu hỏi thường gặp
          #FAQ: uploading existing photos — question
          upload_existing_question: Tôi có thể tải lên ảnh tôi đã có không?
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            Đúng! Miễn là bạn biết đại khái khi nào và ở đâu một bức ảnh được chụp, những bức ảnh cũ hơn đều được hoan nghênh.
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: Ai có thể làm khoa học với các quan sát của iNaturalist?
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            Bất cứ ai! Tất cả các quan sát của iNaturalist đều mở và có sẵn miễn phí - cho các nhà nghiên cứu, các nhà thực hành bảo tồn và các cá nhân tò mò.
          #FAQ: research grade definition — question
          research_grade_question: '"Điểm nghiên cứu" có nghĩa là gì?'
          #FAQ: research grade definition — answer
          research_grade_answer: >
            Khi cộng đồng đồng ý về một nhận dạng, một quan sát sẽ trở thành "cấp nghiên cứu" và đi vào hồ sơ khoa học toàn cầu. Mọi nhận dạng đều có thể giúp đạt được điều đó.
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: Tôi có cần biết mình đang xem gì không?
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            Không hề! Chia sẻ một bức ảnh và một cộng đồng toàn cầu gồm các nhà tự nhiên học có thể giúp bạn xác định nó.
          #FAQ: whether the app is required — question
          need_app_question: Tôi có cần sử dụng ứng dụng không?
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            Trên máy tính để bàn, iNaturalist.org hoạt động rất tốt. Trên thiết bị di động, ứng dụng mang đến cho bạn trải nghiệm tốt nhất — đặc biệt là để xác định các loài khi đang di chuyển.
  number:
    format:
      significant: false
      strip_insignificant_zeros: false
    human:
      format:
        significant: true
        strip_insignificant_zeros: true
  activerecord:
