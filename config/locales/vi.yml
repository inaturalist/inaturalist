    Nếu tắt tính năng này, bạn sẽ không còn nhận được thông báo về giấy tờ tùy thân đồng ý
    với của bạn trừ khi họ có nhận xét bổ sung.
  conservation_status_descriptions:
    iucn: |
      Mã Sách đỏ IUCN tương đương. Đây không phải là đánh giá thực tế của IUCN,
      chỉ có mã IUCN phù hợp nhất với mối đe dọa tiết lộ tọa độ
      được ngụ ý bởi trạng thái này. Điều này sẽ ghi đè quyền riêng tư địa lý nếu nó là "Ít nhất
      Mối quan tâm" hoặc thấp hơn, vì vậy nếu bạn muốn che khuất các quan sát về điều này
      đơn vị phân loại, đặt thành "Gần bị đe dọa" trở lên.
