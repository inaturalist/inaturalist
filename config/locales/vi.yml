  user_trusts_this_project_when_added_by_any: |
    Người dùng tin tưởng người quản lý dự án với tọa độ ẩn của các quan sát được thêm vào
    cho dự án bởi bất kỳ ai.
  user_trusts_this_project_when_added_by_observer: |
    Người dùng tin tưởng người quản lý dự án với tọa độ ẩn của các quan sát được thêm vào
    cho dự án của quan sát viên.
