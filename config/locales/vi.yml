      announcement:
        excludes_non_site: Ẩn các thông báo khác trong vị trí quảng cáo này không có ID trang web
        #iNat client applications that the user must not have made an observation
        #with to see the announcement
        exclude_observation_oauth_application_ids: Loại trừ người quan sát khỏi ứng dụng
        #iNat client applications that the user must have made an observation
        #with to see the announcement
        include_observation_oauth_application_ids: Bao gồm người quan sát từ ứng dụng
        #Preference for an announcement that is only shown to the user who created the announcement
        target_creator: Người tạo mục tiêu (để thử nghiệm)
      user:
        faved_project_ids: Các dự án yêu thích
    errors:
      messages:
        must_look_like_an_email_address: phải trông giống như một địa chỉ email
        requires_privilege_interaction: phải có địa chỉ email đã được xác nhận để làm điều đó
      models:
        project_fave:
          attributes:
            base:
              only_seven_projects: Bạn chỉ có thể yêu thích 7 dự án
        user:
