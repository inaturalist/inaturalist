ka:
  #Label for an option to show any place
  any_place: ყველა
  app_owner_application_about_p2_html: |
    2022 წლის მდგომარეობით, ჩვენ ვითხოვთ ხელით დამტკიცებას მომხმარებლებისთვის, რომელთაც სურთ API კლიენტების დამზადება.
    მესამე მხარის აპების შესაქმნელად, ჯერ უნდა წარმოადგინოთ პროგრამა, რომ გახდეთ
    "აპლიკაციის მფლობელი". ამ აპლიკაციაში უნდა აღწერდეს თქვენი შემოთავაზებული აპლიკაციის ფუნქციონირებას
    და როგორ აპირებთ მის გამოყენებას. განაცხადის წარსადგენად თქვენი ანგარიში უნდა იყოს
    მინიმუმ 2 თვის და უნდა გაკეთებულიყო მინიმუმ 10 <a href="https://help.inaturalist.org/support/solutions/articles/151000170241"
    target="_blank">იდენტიფიკაციის გაუმჯობესება</a> ბოლო თვეში. ჩვენ შეიძლება ვკითხოთ შემდგომი
    კითხვები თქვენი გეგმის შესახებ და ჩვენ ვიტოვებთ უფლებას უარი ავუქცეთ განაცხადებს რაიმე მიზეზით.
  #A confirmation message after a user initially presses the delete button for a sound to ensure they want to proceed with deletion.
  are_you_sure_you_want_to_delete_this_sound?: დარწმუნებული ხართ, რომ გსურთ ამ ხმის წაშლა?
  artificially_generated_content: ხელოვნურად გენერირებული კონტენტი
  artificially_generated_content_desc: შეიცავს შინაარსს, რომელიც ძირითადად ან მთლიანად გენერირებულია ხელოვნური ინტელექტის საშუალებით.
  community_taxon_matches_observation_taxon: საზოგადოების ტაქსონი ემთხვევა დაკვირვების ტაქსონს
  confirming_ids: ID- ების დადასტურება
  confirming_ids_description: |
    თუ ამას გამორთავთ, აღარ ეცნობებათ იმ ID- ების შესახებ, რომლებიც ეთანხმებიან
    თქვენთან ერთად, თუ მათ არ აქვთ დამატებითი შენიშვნები.
  conservation_status_descriptions:
    iucn: |
      ეკვივალენტური IUCN წითელი სიის კოდი. ეს არ არის IUCN– ის რეალური შეფასება,
      მხოლოდ IUCN კოდი, რომელიც საუკეთესოდ შეესაბამება კოორდინატთა გამჟღავნების საფრთხეს
      ამ სტატუსით გათვალისწინებული. ეს გადალახავს გეოპრივაციებს, თუ ის არის "მინიმუმ
      შეშფოთება" ან ქვემოთ, ასე რომ, თუ გსურთ ამის ბუნდოვანი დაკვირვებები
      ტაქსონი, დააყენეთ ეს "ახლოს საფრთხეში" ან ზემოთ.
  #verb, call to action, e.g. "Contribute to real science"
  contribute: წვლილი შეიტანეთ
  curator_coordinate_access: კურატორის კოორდინატული წვდომა
  curator_coordinate_access_desc: |
    კურატორი კოორდინაციას უწევს ტრადიციულ პროექტებზე წვდომას, დამოკიდებულია იმაზე, თუ ვინ დაამატა
    დაკვირვება პროექტზე. ეს მხოლოდ ნაგულისხმევი პარამეტრია
    დაკვირვებები პროექტებში. დამკვირვებლებს ასევე შეუძლიათ აირჩიონ ამის შეცვლა
    ინდივიდუალური დაკვირვებები.
  #Text to inform the user what the current consensus is for a given specimen's identification (aka taxon)
  current_community_id: "ამჟამინდელი საზოგადოების ტაქსონი: %{taxon}"
  dashboard_pilots:
    #button asking to participate in a pilot
    pilot_participate: "დიახ! ბთჳ თჟკალ ეა ჟვ ოჲწგწ."
    #title for a pilot asking users to help fill species gaps by identifiying needs_id observations of species not in the computer vision model
    gaps_id_pilot_title: "საიდენტიფიკაციო ხარვეზების პილოტი: საჭიროებს ID ძებნილ სახეობებს"
  #Label for a button to delete a sound file
  delete_sound: ხმის წაშლა
  devise:
    failure:
      #Error message seen when using attempting to reset a password using an invalid reset token
      reset_password_token_invalid: პაროლის გადატვირთვის ნიშანი არასწორია. გთხოვთ, გამოიყენოთ ბმული ყველაზე ცოტა ხნის წინ გაგზავნილ პაროლის ელ.ფოსტაში, ან <a href="%{url}">მოითხოვეთ ახალი</a>.
  #message informing the user the must confirm their email address to interact with other users
  devise_confirmation_instructions_please_click2: |
    გთხოვთ, დააწკაპუნოთ ქვემოთ მოცემულ ბმულზე, რომ დაადასტუროთ თქვენი ელ.ფოსტის მისამართი. თუ არ დაადასტურებთ თქვენს ელ.ფოსტას
    მისამართი, თქვენ ვერ შეძლებთ სხვა მომხმარებლების შინაარსთან ურთიერთობას.
  #verb, call to action, e.g. "Discover nature nearby"
  discover: აღმოაჩინეთ
  #Checkbox controlling whether to show observations that have disagreeing
  #identifications or not
  disagreements: უთანხმოებები
  #Title / tooltip for the disagreements checkbox
  disagreements_show_observations_that: აჩვენეთ დაკვირვებები, რომლებსაც არ აქვთ არ ეთანხმებით იდენტიფიკაცია
  #Imperative verb; link to a page where a user can donate money to iNaturalist
  donate_: შემოწირულობა
  #Title for a page to edit an announcement
  editing_announcement_x: განცხადების რედაქტირება %{id}
  #The text response for when a sound file's data (i.e. creative commons licensing information) failed to update in our database.
  error_updating_sound: "ხმის განახლების შეცდომა: %{sound_errors}"
  evidence_accurately_depicts_organism_or_scene: მტკიცებულებები ზუსტად ასახავს ორგანიზმს ან სცენას
  #Label for a computer file's content type. Example values: audio/mp3, image/gif
  file_format: ფაილის ფორმატი
  #Label for the URL to a file (i.e. to a sound file, image file)
  file_url: ფაილის URL
  #A warning in a small header to a user that this sound is considered problematic to listen to by another user (i.e. it is spam, has offensive content)
  heads_up_this_sound_has_been_flagged: "თამარ ჩუგოშვილი: ეს ხმა გაისმა."
  #verb, call to action, e.g. "Identify nature nearby"
  identify_verb: იდენტიფიცირება
  #Title for a preference to control whether you receive notifications about
  #infraspecies IDs, i.e. identifications of taxa below the species level,
  #like subspecies
  infraspecies_ids: ინფრასტრუქტურული სსეკიტების შესახებ
  #verb, call to action, e.g. "Learn from a global community of naturalists"
  learn: სწავლა
  #Adjectival phrase describing state of being logged in
  logged_in: შესული ხართ
  #Adjectival phrase describing state of being logged out
  logged_out: შესული ხართ
  #Label for a button or section that shows additional options
  more_options: დამატებითი დეტალები
  #A user who is not a curator
  non_curator: არაკურატორი
  #A user who does not admin any projects
  non_project_admin: არაპროექტის ადმინისტრატორი
  #verb, call to action, e.g. "Observe nature nearby"
  observe: დააკვირდით
  observation_fields_for_projects: დაკვირვების სფეროები პროექტებისთვის
  #message describing a delay between importing a place and observations appearing in it
  place_imported_delay: შეიძლება დასჭირდეს დღე, რომ დაკვირვებები ამ ადგილთან იყოს დაკავშირებული.
  #user-facing guidance that new places cannot be too large
  places_warning_area: |
    ადგილები არ შეიძლება იყოს 700,000 კვადრატულ კილომეტრზე მეტი.
  #user-facing guidance that new places cannot be too large, with a smaller max area
  #when we have enable the "content-freeze" mode to reduce processing on the site
  places_warning_area_during_content_freeze: |
    ადგილები არ შეიძლება იყოს 70,000 კვადრატულ კილომეტრზე მეტი.
  #user-facing guidance that new places cannot contain too many observations
  places_warning_observation_count: |
    ადგილები არ შეიძლება შეიცავდეს 200,000-ზე მეტ დაკვირვებას.
  #user-facing guidance that new places cannot contain too many observations, with a lower max
  #observat count when we have enable the "content-freeze" mode to reduce processing on the site
  places_warning_observation_count_during_content_freeze: |
    ადგილები არ შეიძლება შეიცავდეს 10,000-ზე მეტ დაკვირვებას.
  #A user who admin's a project
  project_admin: პროექტის ადმინისტრატორი
  rank_levels:
    #Label when displaying genus level, which is the same for genus and
    #genushybrid
    genus: გვარის / გვარისჰიბრიდი
    #Label when displaying species level, which is the same for species and
    #hybrid
    species: სახეობები / ჰიბრიდი
    #Label when displaying infraspecies level, which is the same for all the
    #infraspecies ranks
    subspecies: სუბსიდიები / მრავალფეროვნება / ფორმა
  search: ძებნა
  sign_out: გამოსვლა
  sign_up: რეგისტრაცია
  sign_up_sentence_case: რეგისტრაცია
  sounds:
    #The title to an uploaded sound file. Id is typically a number, and Attribution is the name of the uploader plus creative licensing information i.e. "all rights reserved"
    sound_by_id_attribution: ხმა %{id}, %{attribution}
    #Message that notifies a user that their sound was successfully deleted
    sound_deleted: ხმა წაიშალა
    #Notifies an admin/curator that they successfully censored a sound from the website
    sound_hidden: ჟღერადობა დამალული
    #Notifies an admin/curator that they successfully UNcensored a sound -- the sound can now be listened to by everyone
    sound_unhidden: დაუმალავი ჟღერს
  #Verb, call to action, e.g. "Track species you've seen worldwide"
  track: სიმღერა
  #Notifies a user that they were able to successfully change information about a sound file (i.e. creative licensing information)
  updated_sound: განახლებული ხმა
  user_trusts_this_project_when_added_by_any: |
    მომხმარებელი ენდობა პროექტის კურატორებს დამატებული დაკვირვებების ფარული კოორდინატებით
    ვინმეს მიერ პროექტს.
  user_trusts_this_project_when_added_by_observer: |
    მომხმარებელი ენდობა პროექტის კურატორებს დამატებული დაკვირვებების ფარული კოორდინატებით
    დამკვირვებლის პროექტს.
  user_trusts_this_project_when_added_by_none: |
    მომხმარებელი არ ენდობა პროექტის კურატორებს ფარული კოორდინატებით.
  username: მომხმარებელი
  we_also_support3: |
    ჩვენ ასევე მხარს ვუჭერთ ფოტოების იმპორტს <a href="http://flickr.com">Flickr</a>.
  views:
    announcements:
      locales_desc: |
        CMD- ან SHIFT- დააჭირეთ მრავალჯერადი ასარჩევად. შერჩევა "ყველა" ან არ მიღების
        შერჩევა აჩვენებს განცხადებას ყველა მომხმარებელს მიუხედავად
        ლოკალური. ენის არჩევა რეგიონის გარეშე * არა* სამიზნე
        ადგილობრივები რეგიონებით, მაგალითად, თუ ინგლისური აირჩიეთ, ის არ გამოჩნდება
        მათთვის, ვინც აირჩია ინგლისური (დიდი ბრიტანეთი).
      clients_desc: |
        CMD- ან SHIFT- დააჭირეთ მრავალჯერადი ასარჩევად. შერჩევა "ყველა" ან არ მიღების
        შერჩევა აჩვენებს განცხადებას ყველა მომხმარებელს მიუხედავად
        კლიენტი.
      end_desc: |
        დრო თქვენი ანგარიშის დროის ზონაში, რომ ეს განცხადება შეწყდება
        გამოჩენა. ვრცელდება დროის ზონებში, ასე რომ ყველა შეწყვეტს ნახვას
        ეს ამავე დროს, არ არის მათი ადგილობრივი დრო.
      excludes_non_site_desc: |
        თუ თქვენი განცხადება მიზნად ისახავს საიტს (რაც ნაგულისხმევია, თუ თქვენ ხართ
        საიტის ადმინისტრატორი), ეს გამორიცხავს განცხადებებს, რომლებიც მიზნად ისახავს ყველა საიტს
        ეს განთავსება.
      exclude_ip_countries_desc: |
        CMD- ან SHIFT-დააწკაპუნეთ მრავალჯერადი ასარჩევად. შერჩეული ქვეყნები არ გამოჩნდება
        განცხადება. თუ IP ქვეყნები არჩეულია, აირჩიეთ IP ქვეყნების გამორიცხვა
        გამოაკლდება პირველიდან.
      observation_oauth_application_ids_desc: |
        CMD- ან SHIFT- დააჭირეთ მრავალჯერადი ასარჩევად. შერჩევა "ყველა" ან არ მიღების
        შერჩევა აჩვენებს განცხადებას ყველა მომხმარებელს მიუხედავად
        აპი.
    email_confirmation:
      click_here_to_resend_a_confirmation_email: დააკლიკე აქ, რომ ხელახლა გააგზავნოთ დადასტურების ელ.ფოსტა
      #message displayed after users trigger sending a email to confirm their email address
      confirmation_email_sent: გაგზავნილია ელ.ფოსტა
      #text displayed before showing a user the email address that we will
      #resend a confirmation email to
      here_is_the_email_colon: |
        აქ არის ელ.ფოსტის მისამართი, რომელსაც ჩვენ გავაგზავნით დადასტურებას:
      #statement introducing suggestions for users that do no receive confirmation emails
      if_you_do_not_receive_the_email_here_are_tips_colon: |
        თუ არ მიიღებთ ელ.წერილს, აქ მოცემულია რამდენიმე რჩევა:
      #statement telling users to contact us if they are not receiving confirmation emails
      if_you_are_still_not_receiving_email_contact_us_html: თუ თქვენ ჯერ კიდევ არ იღებთ დამადასტურებელ ელფოსტას, გთხოვთ დაგვიკავშირდეთ <a href="mailto:help+confirmation@inaturalist.org">help@inaturalist.org</a> ასე რომ, ჩვენ შეგვიძლია დაგეხმაროთ.
      please_add_an_email_and_password: გთხოვთ, დაამატოთ ელ.ფოსტა და პაროლი, რათა არ დაკარგოთ წვდომა თქვენს ანგარიშზე
      please_click_the_link_sent_to_email_to_confirm_html: გთხოვთ, დააწკაპუნოთ ბმულზე <span class="email">%{email}</span> თქვენი ელ.ფოსტის მისამართის დასადასტურებლად.
      please_confirm_that_email_is_the_best_contact_html: გთხოვთ დაადასტუროთ, რომ <span class="email">%{email}</span> არის საუკეთესო გზა თქვენთან დასაკავშირებლად. #message requesting users confirm their email address to be able to engage with other users
      please_confirm_to_interact_and_access: გთხოვთ, დაადასტუროთ თქვენი ელ.ფოსტის მისამართი სხვა მომხმარებლების შინაარსთან ურთიერთობისა და გარკვეულ გვერდებზე წვდომისთვის. #message requesting that a user confirm their email address, displaying the email to confirm
      please_confirm_your_email_address_html: გთხოვთ, დაადასტუროთ თქვენი ელ.ფოსტის მისამართი <span class="email">%{email}</span>. #statement used in areas that might contain a form allowing users to add comments, etc. This # informs users they must confirm their email address if they want to be able to interact
      please_confirm_to_interact: გთხოვთ, დაადასტუროთ თქვენი ელ.ფოსტის მისამართი სხვა მომხმარებლების შინაარსთან ურთიერთობისთვის
      #statement used on pages that are not functional unless a user has confirmed their email address
      please_confirm_to_use_this_page: გთხოვთ, დაადასტუროთ თქვენი ელ.ფოსტის მისამართი ამ გვერდის გამოსაყენებლად
      #tip for users who do not receive confirmation emails to check if their email view is filtered
      tips_check_email_filters: შეამოწმეთ ნებისმიერი ფილტრი, რომელმაც შეიძლება წაშალოს ჩვენი ელ.ფოსტა თქვენი შემოსულებიდან #tip for users who do not receive confirmation emails to check their email spam folder
      tips_check_your_spam_folder: შეამოწმეთ სპამის საქაღალდე
      your_site_account_has_no_email: შენი %{site_name} ანგარიშს არ აქვს მასთან დაკავშირებული ელ.ფოსტის მისამართი.
    guides:
      index:
        funding2_html: |
          გიდების განვითარების დაფინანსება განხორციელდა
          <a href="http://eol.org"><img alt="Encyclopedia of Life" src="%{image_url}"></a>
    messages:
      index:
        #Users cannot create messages if they lack the criteria for
        #earning interaction privilege
        interaction_privilege_notice: |
          ელ.ფოსტის დადასტურების შემდეგ თქვენ შეძლებთ გაგზავნოთ ახალი შეტყობინებები
          მისამართი. ახლა თქვენ შეგიძლიათ წაიკითხოთ და უპასუხოთ შეტყობინებას, რომელსაც სხვა ადამიანები გიგზავნიან.
        #Users cannot create messages if they lack the criteria for
        #earning interaction or speech privilege
        privilege_notice: |
          ელ.ფოსტის დადასტურების შემდეგ თქვენ შეძლებთ გაგზავნოთ ახალი შეტყობინებები
          მისამართი და დაემატა სამი გადამოწმებული დაკვირვება ან სამი იდენტიფიკაცია
          სხვებისთვის. ახლა თქვენ შეგიძლიათ წაიკითხოთ და უპასუხოთ შეტყობინებას, რომელსაც სხვა ადამიანები გიგზავნიან.
    observations:
      show:
        #One of a list of requirements an observation must meet to be in the Research Grade category
        dqa_help_research_grade_community_observation_html: |
          ის <strong>სათემო ტაქსონი და დაკვირვების ტაქსონი ემთხვევა</strong>
          (გადამისამართდა გვერდიდან სალომე ზურაბიშვილი)
          კონკრეტული, ვიდრე საზოგადოების ტაქსონი)
        #One of a list of reasons for an observation to revert to Casual
        dqa_help_casual_not_accurate_evidence_html: |
          დაკვირვება <strong>არ წარმოადგენს ორგანიზმის ზუსტ მტკიცებულებებს ან
          სცენა</strong> (მაგ. ხელოვნური ინტელექტი გამოიყენებოდა დასამატებლად, მოსაშორებლად ან ჩანაცვლებისთვის)
          ელემენტები სურათზე ან ხმაში. ხმაურის შემცირება, ფოკუსის დაწყობა ან დამზადება
          მცირე შესწორებები, როგორიცაა სენსორის მტვრის მოცილება, ჩვეულებრივ კარგია).
    sounds:
      show:
        #The user has been warned that an uploaded sound file has been noted as being problematic.
        #To bypass the warning, this additional text provides a link to the sound and guidance.
        view_original_html: |
          ორიგინალის ნახვა შეგიძლიათ აქ <a href="%{url}">%{url}</a>. გთხოვ
          დატოვეთ საავტორო უფლებების დარღვევის დროშები, როგორც გადაუჭრელი, თუ ეს ხმა
          არღვევს საავტორო უფლებებს.
    taxa:
      edit:
        #a message when you try to save major changes to a taoxn name
        you_can_only_make_minor_changes_to_the_species_epithet_directly_html: |
          თქვენ შეგიძლიათ მხოლოდ უმნიშვნელო ცვლილებების შეტანა სახეობების ეპითეტში პირდაპირ (მაგ. სქესის ცვლილებები, მართლწერის შეცდომა). დამატება <a target="_blank" href="%{url}">ტაქსონის გაცვლა</a> თუ თქვენ გჭირდებათ სხვა ცვლილებები სახელში.
      #error message when the Flickr tagger feature fails
      something_went_wrong_tags: |
        რაღაც არასწორად მოხდა ამ ტეგების გამოქვეყნების მცდელობისას: %{message}
    users:
      edit:
        block_desc_blocking_someone_prevents: |
          ვინმეს დაბლოკვა ხელს უშლის მათ შეტყობინებების გაგზავნას, კომენტარს აკეთებს თქვენს შესახებ
          დაკვირვებები, თქვენი დაკვირვებების იდენტიფიცირება და სხვაგვარად ურთიერთქმედება
          თქვენთან ერთად %{site_name}. ის ასევე შლის მათ დაკვირვებებს თქვენი
          ძიების შედეგები და შლის თქვენს დაკვირვებებს მათი ძიებისგან
          შედეგები. თუმცა, ეს მათთვის უხილავს არ ხდის. მათ შეუძლიათ
          ჯერ კიდევ იპოვნეთ თქვენი დაკვირვებები და ნახეთ თქვენი პროფილი, მათ უბრალოდ არ შეუძლიათ
          ურთიერთქმედება თქვენთან.
        block_desc_blocking_is_for_situations: |
          დაბლოკვა არის იმ სიტუაციებისთვის, როდესაც თქვენ უბრალოდ ვერ შეძლებთ ერთად
          ვიღაც და ისინი არ დაგტოვებენ მარტო, მიუხედავად თქვენი საუკეთესო ძალისხმევისა
          დავების ცივილიზებულად მოგვარება. ეს არ არის დამალვის გზა
          ხალხი, რათა თავიდან იქნას აცილებული იმ ადამიანების იდენტიფიკაცია, რომელთა მოსაზრებებიც თქვენ
          არ ენდოთ, ან უარი თქვათ საზოგადოების პირადობის მოწმობაზე (არსებობს სხვა
          ამის დაყენება). ამრიგად, დაბლოკვა მუშაობს ორივე გზით: თუ დაბლოკავთ
          ვიღაც, მათ არ შეუძლიათ თქვენთან ურთიერთობა, მაგრამ თქვენ ასევე არ შეგიძლიათ ურთიერთქმედება
          მათთან ერთად. თუ ბოროტად იყენებთ მას, რათა ვინმემ არ დაადგინოს თქვენი
          დაკვირვებები, თქვენ ასევე ხელს უშლით მათ იდენტიფიცირებას
          დაკვირვებები.
        block_desc_you_can_only_block_html: |
          თქვენ შეგიძლიათ მხოლოდ სამი ადამიანის დაბლოკვა. ჩვენ ვფიქრობთ, რომ ეს გონივრულია
          ნომერი, რომელიც იტევს იმ ადამიანებს, რომლებსაც დაბლოკვა სჭირდებათ
          დაბლოკვის ბოროტად გამოყენების პრევენცია. თუ გრძნობთ, რომ მეტი დაბლოკვა გჭირდებათ
          ხალხი, გთხოვთ <a href="mailto:%{help_email}">დაგვიკავშირდით</a>.
        block_desc_there_are_two_exceptions: |
          არსებობს ორი სიტუაცია, როდესაც დაბლოკვა ხელს არ უშლის ურთიერთქმედებას:
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: სადაც თქვენი ცნობისმოყვარეობა ხელს უწყობს მეცნიერებას.
          #Hero subheadline describing the core value proposition
          #TODO: test that line break here doesn't cause line break
          subheadline: >
            ამოიცნეთ მცენარეები, ცხოველები, სოკოები და სხვა, ხოლო დედამიწაზე სიცოცხლის ცოცხალ ატლასს დაამატეთ.
          #Primary call-to-action button in the hero section
          cta_join: შეუერთდით საზოგადოებას
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: უფასო, არაკომერციული, საზოგადოების მიერ მომუშავე.
        features:
          #Section label introducing the three core user actions
          intro: "iNaturalist-ით შეგიძლიათ:"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: მცენარეები, ცხოველები, სოკოები და სხვა
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: სახეობები, რომლებიც მსოფლიოში გინახავთ
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: რეალურ მეცნიერებაში
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: ბუნება ახლომდებარე
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: ნატურალისტთა გლობალური საზოგადოებისგან
        stories:
          #Section heading for real-world stories powered by community science
          heading: სათემო მეცნიერების ძალა
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: ნანახი %{user} in %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: დიდი ხნის დაკარგული სახეობების ხელახლა აღმოჩენა
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            ეს %{moth_common_name} ჩრჩილი ათწლეულების განმავლობაში არ ყოფილა დაფიქსირებული და ოდესღაც გადაშენებული ითვლებოდა - სანამ ახალ ზელანდიაში ტურისტმა შემთხვევით არ შენიშნა.
          #Heading for the story about a new-to-science mantis species
          mantis_heading: მეცნიერებისთვის ახალი სახეობების აღმოჩენა
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">ინიმია ნატი</span> - შემოკლებით <span class="italic">I. nat</span> - არის ახალი მეცნიერული მანტისის სახეობა, რომელიც ავსტრალიაში ქალმა იპოვა, რომელიც თავის სამეზობლოში სეირნობდა.
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: ადგილობრივი ეკოსისტემების დაცვა
          #Body text for the amphibian protection story
          amphibian_body: >
            კალიფორნიაში ადგილობრივი მოხალისეების ჯგუფი შეიკრიბა iNaturalist– ის საშუალებით, რათა დაიცვან მიგრირებადი ამფიბიები, რომლებიც გადაკვეთენ დატვირთულ გზას.
          #Link below the stories to read more community science stories
          read_more: წაიკითხეთ მეტი ისტორიები
        observation:
          #Heading for the sample observation section
          heading: ყოველი დაკვირვება მოგვითხრობს ისტორიას
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: ბიომრავალფეროვნების მეცნიერებაში ხელშემწყობი დაკვირვებები
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: სახეობები, რომლებიც დოკუმენტირებულია მთელს მსოფლიოში
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: ნაშრომები iNaturalist მონაცემების ციტირებით
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: საზოგადოების მეცნიერების მიერ აღმოჩენილი ან ხელახლა აღმოჩენილი სახეობები
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            გახსენით აპლიკაცია და გადაიღეთ ნებისმიერი გარეული მცენარე, ცხოველი, სოკო ან სხვა ორგანიზმი - თქვენი სამეზობლოდან ან მსოფლიოს ნებისმიერი ადგილიდან.
          #Step 2 description — explaining AI and community identification
          step2_body: >
            აპლიკაცია მყისიერად გვთავაზობს იდენტიფიკაციას და ნატურალისტების გლობალური საზოგადოება ადასტურებს ან აუმჯობესებს მას.
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            თქვენი დაკვირვება ხდება ღია მონაცემები - რომელსაც იყენებენ მეცნიერები, კონსერვატორები და მკვლევარები მთელ მსოფლიოში.
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            ბუნება უფრო სწრაფად იცვლება, ვიდრე ოდესმე, ამიტომ ჩვენ გვჭირდება <span class="underline">თქვენ</span> დამეხმარეთ იმის ჩაწერაში, თუ რა ცხოვრობს სად ცხოვრობს.
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            ეს ნამდვილად დამეხმარა სახეობების იდენტიფიკაციაში, გარდა იმისა, რომ მომცა შესაძლებლობა მქონოდა სხვადასხვა ადამიანებთან ურთიერთობა მთელს მსოფლიოში.
          #Job title and location of the testimonial author (last name Gube)
          gube_title: საზღვაო კონსერვატორი და წყალქვეშა ფოტოგრაფი, კენია
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            iNaturalist ხსნის კარს ამდენი ახალი და საინტერესო კვლევისთვის შესწავლილი ტაქსების შესახებ. ჩემი აზრით, ეს პლატფორმა ეკოლოგიური მეცნიერების უახლესი ზღვარია.
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: საველე გზამკვლევი ავტორი შპს Owlfly-ში, აშშ
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            iNaturalist და მისი იდენტიფიკატორების თავდადებული საზოგადოება გახდა ფასდაუდებელი რესურსი ჩემს გამოკვლევებში. ამან ხელი შეუწყო ჩემი ამჟამინდელი მუშაობის საფუძველს.
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: ბიომრავალფეროვნების მკვლევარი, შრი-ლანკა
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist არის ძლიერი ინსტრუმენტი, რომელიც აკავშირებს ადამიანებს, ბუნებასა და ცოდნას. მე შემიძლია გადავიღო იშვიათი სახეობა, ან თუნდაც ის, რომელიც ჯერ არ არის აღწერილი და ამავე დროს, ხელს ვუწყობ ჩვენი ბუნებრივი მემკვიდრეობის შენარჩუნებას.
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: გარემოსდაცვითი ტექნიკოსი და ჰობი ფოტოგრაფი, ბრაზილია
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            არ აქვს მნიშვნელობა სად იმყოფებით მსოფლიოში, გაქვთ თუ არა დოქტორის ხარისხი თუ უბრალოდ გიყვართ გარეთ, iNaturalist მიგიყვანთ ბუნებასთან და ბევრ თანამემამულე ნატურალისტთან.
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: ბიოლოგი, მექსიკა
        everyone:
          #Heading for the broad audience section
          heading: ყველა ნატურალისტია
          #Description inviting anyone who has been curious about a living thing
          body: >
            თუ ოდესმე ყურადღებით დააკვირდით რაღაც ცოცხალს და გაინტერესებთ რა იყო ეს, iNaturalist თქვენთვისაა.
          #Heading for the impact sub-section
          impact_heading: თქვენ შეგიძლიათ გავლენა მოახდინოთ
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            ყოველი ფოტო, რომელსაც თქვენ აზიარებთ, ხდება გლობალური სამეცნიერო ჩანაწერის ნაწილი, რომელზეც მკვლევარები მთელ მსოფლიოში არიან დამოკიდებული.
          #Heading for the community reputation sub-section
          community_heading: '"ყველაზე ლამაზი ადგილი ონლაინში"'
          #Description of the welcoming community aspect
          community_body: >
            მოდი იდენტიფიკაციისთვის, დარჩით საზოგადოებისთვის და გავლენა მეცნიერებაზე.
        download:
          #Heading prompting users to download the mobile app
          heading: ჩამოტვირთეთ iNaturalist აპი
          #Subheading describing the two core benefits of the app
          subheading: მიიღეთ რეალურ დროში იდენტიფიკაცია და წვლილი შეიტანეთ მეცნიერებაში
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ ჩამოტვირთვები"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: გამოიკვლიეთ სახეობები მთელ მსოფლიოში
          #Button / link to browse species without downloading
          button: გამოიკვლიეთ ახლავე
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "13 წლამდე? ჩამოტვირთეთ Seek!"
          #Description of Seek's badge and challenge features
          body: მიიღეთ სამკერდე ნიშნები და მიიღეთ მონაწილეობა სახეობებზე დაკვირვების გამოწვევებში!
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ 5 ვარსკვლავიანი მიმოხილვები"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: მიიღეთ ჩვენი ყოველთვიური ბიულეტენი!
          #Description of the newsletter's content
          body: იყავით დაკავშირებული iNaturalist საზოგადოების ისტორიებთან და აღმოჩენებთან.
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist არის არაკომერციული ორგანიზაცია, რომელიც მხარს უჭერს მეცნიერებას და კონსერვაციას.
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: თქვენი მხარდაჭერა ამას შესაძლებელს ხდის.
          #Call-to-action button for the donation section
          cta: შემოწირულობა ახლავე
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: ხშირად დასმული კითხვები
          #FAQ: uploading existing photos — question
          upload_existing_question: შემიძლია ავტვირთო ფოტოები, რომლებიც უკვე მაქვს?
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            დიახ! სანამ იცით უხეშად როდის და სად იქნა გადაღებული ფოტო, ძველი ფოტოები მისასალმებელია.
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: ვის შეუძლია მეცნიერების გაკეთება iNaturalist დაკვირვებებით?
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            ნწკჲი! ყველა iNaturalist დაკვირვება ღია და თავისუფლად ხელმისაწვდომია - მკვლევარებისთვის, კონსერვაციის პრაქტიკოსებისთვის და ცნობისმოყვარე პირებისთვის.
          #FAQ: research grade definition — question
          research_grade_question: რას ნიშნავს "კვლევის შეფასება"?
          #FAQ: research grade definition — answer
          research_grade_answer: >
            როდესაც საზოგადოება თანხმდება იდენტიფიკაციაზე, დაკვირვება ხდება "კვლევის კლასი" და შედის გლობალურ სამეცნიერო ჩანაწერში. ყველა იდენტიფიკაცია დაგეხმარებათ იქ მოხვედრაში.
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: უნდა ვიცოდე რას ვუყურებ?
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            სულაც არა! გააზიარეთ ფოტო და ნატურალისტთა გლობალური საზოგადოება დაგეხმარებათ მის ამოცნობაში.
          #FAQ: whether the app is required — question
          need_app_question: მჭირდება აპლიკაციის გამოყენება?
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            სამუშაო მაგიდაზე iNaturalist.org მშვენივრად მუშაობს. მობილურ მოწყობილობაზე აპლიკაცია გაძლევთ საუკეთესო გამოცდილებას - განსაკუთრებით სახეობების იდენტიფიცირებისთვის.
  number:
