    messages:
      index:
        #Users cannot create messages if they lack the criteria for
        #earning interaction privilege
        interaction_privilege_notice: |
          Դուք կկարողանաք նոր հաղորդագրություններ ուղարկել ձեր էլփոստը հաստատելուց հետո
          հասցեն: Այժմ դուք կարող եք կարդալ եւ պատասխանել ձեզ ուղարկող այլ մարդկանց հաղորդագրություններին:
        #Users cannot create messages if they lack the criteria for
        #earning interaction or speech privilege
        privilege_notice: |
          Դուք կկարողանաք նոր հաղորդագրություններ ուղարկել ձեր էլփոստը հաստատելուց հետո
          հասցեն, եւ ավելացվել են երեք ստուգողական դիտարկումներ կամ երեք նույնականացում
          ուրիշների համար: Այժմ դուք կարող եք կարդալ եւ պատասխանել ձեզ ուղարկող այլ մարդկանց հաղորդագրություններին:
    observations:
      show:
        #One of a list of requirements an observation must meet to be in the Research Grade category
        dqa_help_research_grade_community_observation_html: |
          The <strong>Համայնքի տաքսոնի եւ դիտարկման տաքսոնի համընկնում</strong>
          (այն հազվադեպ դեպքերի համար, երբ դիտարկման տաքսոնը կարող է լինել ավելի
          կոնկրետ, քան համայնքային տաքսոնը)
        #One of a list of reasons for an observation to revert to Casual
        dqa_help_casual_not_accurate_evidence_html: |
          դիտարկումը <strong>չի ներկայացնում օրգանիզմի ճշգրիտ ապացույցներ կամ
          տեսարան</strong> (օրինակ՝ արհեստական բանականությունը օգտագործվել է ավելացնելու, հեռացնելու կամ փոխարինելու համար
          պատկերի կամ ձայնի տարրերը: Աղմուկ բարձրացնելը, ֆոկուսի կուտակումը կամ ստեղծելը
          փոքր շտկումները, ինչպիսիք են սենսորային փոշու հեռացումը, սովորաբար լավ են):
    sounds:
      show:
        #The user has been warned that an uploaded sound file has been noted as being problematic.
        #To bypass the warning, this additional text provides a link to the sound and guidance.
        view_original_html: |
          Բնօրինակը կարող եք դիտել հետեւյալ հասցեով՝ <a href="%{url}">%{url}</a>. Խնդրում եմ
          Հեղինակային իրավունքի խախտման դրոշները թողեք որպես չլուծված, եթե այս ձայնը չլուծվի
          խախտել հեղինակային իրավունքը:
    taxa:
      edit:
        #a message when you try to save major changes to a taoxn name
        you_can_only_make_minor_changes_to_the_species_epithet_directly_html: |
          Դուք կարող եք ուղղակիորեն աննշան փոփոխություններ կատարել տեսակի էպիտետում (օրինակ՝ սեռի փոփոխություն, սխալ ուղղագրություն)։ Ավելացնել ա <a target="_blank" href="%{url}">տաքսոնների փոխանակում</a> եթե Ձեզ անհրաժեշտ են անվանման այլ փոփոխություններ:
      show:
        site_curators_disabled_wikipedia_html: |
          Կայքի կուրատորները անջատել են ցուցադրումը <a href="%{url}">սա
          Բովանդակություն Վիքիպեդիայից</a>. Դուք կարող եք օգնել՝ խմբագրելով էջը՝
          Վիքիպեդիա՝ այս տաքսոնի համար հարմար դարձնելու համար, կամ դրոշմելով այս
          տաքսոնը՝ կայքի կուրատորների ուշադրությանը ներկայացնելու համար։
      #error message when the Flickr tagger feature fails
      something_went_wrong_tags: |
        Ինչ-որ բան սխալ է եղել՝ փորձելով տեղադրել այդ թեգերը. %{message}
    users:
      edit:
        block_desc_blocking_someone_prevents: |
          Ինչ-որ մեկին արգելափակելը թույլ չի տալիս նրան հաղորդագրություններ ուղարկել ձեզ, մեկնաբանել ձեր
          դիտարկումների, Ձեր դիտարկումների բացահայտման եւ այլ կերպ փոխազդելու
          Ձեզ հետ %{site_name}. Այն նաեւ հեռացնում է նրանց դիտարկումները ձեր
          որոնման արդյունքները եւ հեռացնում է ձեր դիտարկումները դրանց որոնումից
          արդյունքները: Այնուամենայնիվ, դա ձեզ անտեսանելի չի դարձնում նրանց համար։ Նրանք կարող են
          դեռեւս գտնել ձեր դիտարկումները եւ դիտել ձեր պրոֆիլը, նրանք պարզապես չեն կարող
          շփվել ձեզ հետ:
        block_desc_blocking_is_for_situations: |
          Արգելափակումը այն իրավիճակների համար է, երբ դուք պարզապես չեք կարող համերաշխ լինել
          ինչ-որ մեկին, եւ նրանք ձեզ մենակ չեն թողնի, չնայած ձեր լավագույն ջանքերին
          վեճերը լուծել քաղաքակիրթ ձեւով: Դա թաքնվելու միջոց չէ
          մարդկանց, կանխելու նույնականացումը այն մարդկանցից, ում կարծիքը դուք
          չվստահել, կամ հրաժարվել համայնքի ID-ից (կա մեկ այլ
          դրա համար)։ Այսպիսով, արգելափակումը գործում է երկու ուղղությամբ.
          ինչ-որ մեկին, նրանք չեն կարող շփվել ձեզ հետ, բայց դուք նաեւ չեք կարող շփվել
          նրանց հետ։ Եթե դուք չարաշահում եք այն, որպեսզի ինչ-որ մեկը չճանաչի ձեր
          դիտարկումները, դուք նաեւ թույլ չեք տալիս ինքներդ ձեզ բացահայտել իրենց
          դիտարկումներ:
        block_desc_you_can_only_block_html: |
          Դուք կարող եք արգելափակել միայն երեք հոգու։ Մենք կարծում ենք, որ սա խելամիտ է
          թիվը, որը հարմարեցնում է այն մարդկանց, ովքեր արգելափակման կարիք ունեն, մինչդեռ
          արգելափակման չարաշահումը կանխելը: Եթե զգում եք, որ պետք է ավելի շատ արգելափակեք
          Ժողովուրդ ջան, խնդրում եմ <a href="mailto:%{help_email}">Contact Us</a>.
        block_desc_there_are_two_exceptions: |
          Գոյություն ունի երկու իրավիճակ, երբ արգելափակումը չի խոչընդոտում փոխազդեցությանը.
        errors:
          #error message when a user attempts to update their profile picture using
          #an image that has an unsupported file type
          unsupported_file_type: 'Նիշքի տիպը չի աջակցվում: Մենք ընդունում ենք JPG, PNG եւ GIF'
        this_only_applies_to_traditional_projects2: |
          Սա վերաբերում է միայն ավանդական նախագծերին։ Չի կարելի բացառել դիտարկումները
          հավաքածուներից կամ անձրեւանոցային նախագծերից, որոնք, ըստ էության, պահպանված որոնումներ են:
          Դուք կարող եք կարդալ ավելին
          <a href="https://help.inaturalist.org/support/solutions/articles/151000176472">այստեղ</a>.
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: 'Որտեղ ձեր հետաքրքրասիրությունը նպաստում է գիտությանը:'
          #Hero subheadline describing the core value proposition
          #TODO: test that line break here doesn't cause line break
          subheadline: >
            Բացահայտեք բույսերը, կենդանիները, սնկերը եւ այլն՝ ավելացնելով Երկրի վրա կյանքի կենդանի ատլասը։
          #Primary call-to-action button in the hero section
          cta_join: Միացի՛ր համայնքին
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: Անվճար, շահույթ չհետապնդող, համայնքային ուժով։
        features:
          #Section label introducing the three core user actions
          intro: "iNaturalist-ի միջոցով դուք կարող եք՝"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: բույսեր, կենդանիներ, սնկեր եւ ավելին
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: տեսակներ, որոնք դուք տեսել եք ամբողջ աշխարհում
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: դեպի իրական գիտություն
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: Մոտակայքում գտնվող բնությունը
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: բնագետների համաշխարհային համայնքից
        stories:
          #Section heading for real-world stories powered by community science
          heading: Համայնքային գիտության ուժը
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: Տեսել է %{user} %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: Վաղուց կորցրած տեսակների վերահայտնաբերում
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            The %{moth_common_name} ցեցը տասնամյակներ շարունակ չէր նկատվել եւ մի ժամանակ համարվում էր անհետացած, մինչեւ որ Նոր Զելանդիայում զբոսաշրջիկը պատահաբար նկատեց այն։
          #Heading for the story about a new-to-science mantis species
          mantis_heading: Գիտության նոր տեսակների բացահայտում
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">Inimia nat</span> — կրճատվում է <span class="italic">I. nat</span> - Նոր գիտության մանտիսի տեսակ է, որը հայտնաբերվել է Ավստրալիայում մի կնոջ կողմից, որը զբոսնում է իր հարեւանությամբ։
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: Տեղական էկոհամակարգերի պաշտպանություն
          #Body text for the amphibian protection story
          amphibian_body: >
            Կալիֆորնիայում տեղի կամավորների մի խումբ հավաքվել է iNaturalist-ի միջոցով՝ պաշտպանելու մարդաշատ ճանապարհով անցնող երկկենցաղներին։
          #Link below the stories to read more community science stories
          read_more: Կարդալ ավելին պատմություններ
        observation:
          #Heading for the sample observation section
          heading: Յուրաքանչյուր դիտարկում պատմում է մի պատմություն
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: Կենսաբազմազանության գիտությանը նպաստող դիտարկումներ
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: Տեսակներ, որոնք փաստագրված են ամբողջ աշխարհում
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: հոդվածներ, որոնք վկայակոչում են iNaturalist-ի տվյալները
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: Համայնքի գիտնականների կողմից հայտնաբերված կամ վերահայտնաբերված տեսակներ
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            Բացեք հավելվածը եւ լուսանկարեք ցանկացած վայրի բույս, կենդանի, սնկ կամ այլ օրգանիզմ՝ ձեր հարեւանությամբ կամ աշխարհի ցանկացած կետից:
          #Step 2 description — explaining AI and community identification
          step2_body: >
            Հավելվածը միանգամից առաջարկում է նույնականացում, եւ բնագետների համաշխարհային համայնքը հաստատում կամ կատարելագործում է այն։
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            Ձեր դիտարկումը դառնում է բաց տվյալներ, որոնք օգտագործվում են գիտնականների, բնապահպանների եւ հետազոտողների կողմից ամբողջ աշխարհում։
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            Բնությունը փոխվում է ավելի արագ, քան երբեւէ, ուստի մենք կարիք ունենք <span class="underline">դու</span> օգնել արձանագրել, թե ինչ է ապրում, որտեղ։
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            Այն իսկապես օգնել է ինձ տեսակների նույնականացման հարցում, բացի այն բանից, որ ինձ հնարավորություն է ընձեռել շփվել աշխարհի տարբեր մարդկանց հետ։
          #Job title and location of the testimonial author (last name Gube)
          gube_title: Ծովային բնապահպան եւ ստորջրյա լուսանկարիչ, Քենիա
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            iNaturalist-ը դուռ է բացում այդքան շատ նոր եւ հետաքրքիր հետազոտությունների համար։ Իմ կարծիքով, այս հարթակը էկոլոգիական գիտության առաջատարն է։
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: Field Guide Author at Owlfly LLC, USA
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            iNaturalist-ը եւ նրա նվիրված համայնքը դարձան անգնահատելի ռեսուրս իմ հետազոտություններում։ Այն օգնեց հիմք դնել իմ ներկայիս աշխատանքի համար։
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: Կենսաբազմազանության հետազոտող, Շրի Լանկա
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist-ը հզոր գործիք է, որը կապում է մարդկանց, բնությունը եւ գիտելիքը: Ես կարող եմ լուսանկարել հազվագյուտ տեսակ, կամ նույնիսկ մեկը, որը դեռ չի նկարագրվել, եւ միեւնույն ժամանակ նպաստում եմ մեր բնական ժառանգության պահպանմանը:
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: Բնապահպանական տեխնիկ եւ հոբբի լուսանկարիչ, Բրազիլիա
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            Անկախ նրանից, թե որտեղ եք գտնվում աշխարհում, անկախ նրանից, թե դուք ունեք դոկտորական աստիճան, թե պարզապես սիրում եք դրսում, iNaturalist-ը ձեզ ավելի կմոտեցնի բնությանը եւ շատ բնագետներին:
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: Կենսաբան (Մեքսիկա)
        everyone:
          #Heading for the broad audience section
          heading: Բոլորը բնագետ են
          #Description inviting anyone who has been curious about a living thing
          body: >
            Եթե երբեւէ ուշադիր նայել եք ինչ-որ կենդանի բանի եւ մտածել եք, թե ինչ է դա, iNaturalist-ը ձեզ համար է։
          #Heading for the impact sub-section
          impact_heading: Դուք կարող եք ազդեցություն ունենալ
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            Յուրաքանչյուր լուսանկար, որով կիսվում եք, դառնում է համաշխարհային գիտական արձանագրության մի մասը, որից կախված են ամբողջ աշխարհում հետազոտողները։
          #Heading for the community reputation sub-section
          community_heading: 'Ամենագեղեցիկ վայրն առցանց'
          #Description of the welcoming community aspect
          community_body: >
            Եկեք նույնականացման, մնացեք համայնքի եւ գիտության վրա ազդեցության համար։
        download:
          #Heading prompting users to download the mobile app
          heading: Ներբեռնեք iNaturalist հավելվածը
          #Subheading describing the two core benefits of the app
          subheading: Ստացեք իրական ժամանակում նույնականացումներ եւ նպաստեք գիտությանը
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ Ներբեռնումներ"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: Ուսումնասիրեք տեսակները ամբողջ աշխարհում
          #Button / link to browse species without downloading
          button: Ուսումնասիրեք հիմա
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "13 տարեկանից ցածր։ Ներբեռնել Seek!"
          #Description of Seek's badge and challenge features
          body: 'Վաստակեք կրծքանշաններ եւ մասնակցեք տեսակների դիտարկման մարտահրավերներին:'
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ 5-աստղանի ակնարկներ"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: 'Ստացեք մեր ամսական տեղեկագիրը:'
          #Description of the newsletter's content
          body: Կապ պահպանեք iNaturalist համայնքի պատմությունների եւ հայտնագործությունների հետ։
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist-ը շահույթ չհետապնդող կազմակերպություն է, որն աջակցում է գիտությանը եւ բնապահպանությանը։
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: Ձեր աջակցությունը հնարավոր է դարձնում դա ։
          #Call-to-action button for the donation section
          cta: Նվիրաբերեք հիմա
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: ՀՏՀ-ներ
          #FAQ: uploading existing photos — question
          upload_existing_question: 'Կարո՞ղ եմ վերբեռնել իմ արդեն ունեցած լուսանկարները:'
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            Այո։ Քանի դեռ մոտավորապես գիտեք, թե երբ եւ որտեղ է լուսանկարվել, հին լուսանկարները ողջունելի են։
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: Ո՞վ կարող է գիտություն անել iNaturalist դիտարկումներով։
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            Որեւէ մեկը։ Բոլոր iNaturalist-ի դիտարկումները բաց են եւ ազատ հասանելի՝ հետազոտողների, բնապահպանների եւ հետաքրքրասեր անհատների համար։
          #FAQ: research grade definition — question
          research_grade_question: Ի՞նչ է նշանակում «հետազոտական գնահատական»։
          #FAQ: research grade definition — answer
          research_grade_answer: >
            Երբ համայնքը համաձայնության է գալիս նույնականացման հետ, դիտարկումը դառնում է «հետազոտական գնահատական» եւ մտնում է համաշխարհային գիտական արձանագրություն։ Յուրաքանչյուր նույնականացում կարող է օգնել հասնել դրան ։
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: 'Արդյո՞ք ես պետք է իմանամ, թե ինչ եմ նայում:'
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            Ամենեւին էլ ոչ! Կիսվեք լուսանկարով, եւ բնագետների համաշխարհային համայնքը կօգնի ձեզ ճանաչել այն։
          #FAQ: whether the app is required — question
          need_app_question: 'Արդյո՞ք ես պետք է օգտվեմ հավելվածից:'
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            Աշխատասեղանի վրա iNaturalist.org հիանալի է աշխատում։ Բջջային սարքում հավելվածը ձեզ տալիս է լավագույն փորձը, հատկապես ճանապարհին տեսակների նույնականացման համար:
  number:
    format:
      significant: false
      strip_insignificant_zeros: false
    human:
      format:
        significant: true
        strip_insignificant_zeros: true
  time:
    formats:
      #See https://ruby-doc.org/stdlib-2.6.1/libdoc/date/rdoc/Date.html#method-i-strftime for formatting codes. Use %=B or %=b for lowercase months.
      short: '%-d %b %I:%M %p'
      #See https://ruby-doc.org/stdlib-2.6.1/libdoc/date/rdoc/Date.html#method-i-strftime for formatting codes. Use %=B or %=b for lowercase months.
      short_with_year: '%-d %b %Y %I:%M %p'
  activerecord:
    attributes:
      announcement:
        #Whether or not the announcement can be dismissed by people who see it
        dismissible: Մերժելի
        #Start of a date range that the viewer must not have donated in to see the announcement
        exclude_donor_start_date: Բացառել դոնորի սկիզբը
        #End of a date range that the viewer must not have donated in to see the announcement
        exclude_donor_end_date: Բացառել դոնորի ավարտի ամսաթիվը
        excludes_non_site: Թաքցնել այս տեղադրում գտնվող այլ հայտարարությունները, որոնք չունեն Կայքի ՆՑ
        #iNat client applications that the user must not have made an observation
        #with to see the announcement
        exclude_observation_oauth_application_ids: Բացառել դիտորդներին հավելվածներից
        #start of a date range that the viewer must have donated in to see the announcement
        include_donor_start_date: Ներառել դոնորի սկիզբը
        #End of a date range that the viewer must have donated in to see the announcement
        include_donor_end_date: Ներառել դոնորի ավարտի ամսաթիվը
        #iNat client applications that the user must have made an observation
        #with to see the announcement
        include_observation_oauth_application_ids: Հավելվածներից դիտորդների ներառում
        #List of countries that the viewer's IP address can come from to see the announcement
        ip_countries: IP Երկրներ
        #Start of a date range that includes the viewer's most recent observation
        last_observation_start_date: Վերջին obs սկիզբը ամսաթիվ
        #end of a date range that includes the viewer's most recent observation
        last_observation_end_date: Վերջին obs ավարտի ամսաթիվ
        #Maximum number of identifications the viewer must have added for others to see the announcement
        max_identifications: Առավելագույն նույնականացումներ
        #Minimum number of identifications the viewer must have added for others to see the announcement
        min_identifications: Min identifications
        #Maximum number of observations the viewer must have added for others to see the announcement
        max_observations: Առավելագույն դիտարկումներ
        #Minimum number of observations the viewer must have added for others to see the announcement
        min_observations: Min observations
        #Place in iNat where this announcement will be shown, e.g. web dashboard, mobile home, etc
        placement: Տեղաբաշխում
        #Preference for an announcement that is only shown to the user who created the announcement
        target_creator: Թիրախ ստեղծող (փորձարկման համար)
        #Whether or not the announcement is shown to logged in users
        target_logged_in: Թիրախը մուտք է գործել
        #Earliest date the viewer can have signed up to see the announcement
        user_created_start_date: Օգտվողի գրանցման ամենավաղ ամսաթիվը
        #Latest date the viewer can have signed up to see the announcement
        user_created_end_date: Վերջին օգտվողի գրանցման ամսաթիվ
      taxon:
        #Boolean attribute that controls whether Wikipedia content is shown for this taxon
        shows_wikipedia: Ցույց է տալիս Վիքիպեդիա
      user:
        faved_project_ids: Սիրելի նախագծեր
    errors:
      messages:
        must_look_like_an_email_address: պետք է նման լինի էլփոստի հասցեին
        requires_privilege_interaction: պետք է ունենա հաստատված էլփոստի հասցեն, որպեսզի
      models:
        moderator_action:
          attributes:
            base:
              #Error saying that only staff can rename
              only_staff_can_rename: Միայն անձնակազմը կարող է վերանվանել
        observation:
          attributes:
            observed_on:
              #Error message when user attempts to enter an observation date
              #like "2020 or "2020-05"
              must_be_a_single_day: պետք է լինի մեկ օր, ոչ թե միջակայք
        place:
          attributes:
            place_geometry:
              #Error message when a user uploads a KML that has a polygon
              #where all the points are the same.
              polygon_with_no_area: ունի բազմանկյուն առանց տարածքի (բոլոր կետերը նույնն են)
        project_fave:
          attributes:
            base:
              only_seven_projects: Դուք կարող եք միայն 7 նախագիծ սիրել
        taxon_change:
          attributes:
            base:
              #Taxon changes cannot involve the Life taxon, which is the root of the taxonomic tree
              life_taxon_cannot_be_involved: Կենսական տաքսոնը չի կարող ներգրավվել տաքսոնների փոփոխությունների մեջ
        user:
          attributes:
            faved_project_ids:
              #Error when a user tries to add more than 7 favorite projects,
              #e.g. "Faved projects cannot include more than 7 projects"
              cannot_include_more_than_7_projects: չի կարող ներառել 7-ից ավելի նախագիծ
              #Error when a user tries to add a project that does not exist
              #to their favorite projects, e.g. "Faved projects must all
              #exist"
              must_all_exist: բոլորը պետք է գոյություն ունենան
            login:
              domain_is_not_supported: Դոմենը չի աջակցվում
