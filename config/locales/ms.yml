      target_users_by_identification_behavior: Sasarkan pengguna mengikut tingkah laku pengenalan
      #Description of a group of options for targeting announcements based
      #on observation behavior
      target_users_by_observation_behavior: Sasarkan pengguna mengikut tingkah laku pemerhatian
      #Description of a group of options for targeting announcements based
      #miscellaneous user attributes
      target_users_by_other_attributes: Sasarkan pengguna mengikut atribut lain
    email_confirmation:
      click_here_to_resend_a_confirmation_email: Klik di sini untuk menghantar semula e-mel pengesahan
      #message displayed after users trigger sending a email to confirm their email address
      confirmation_email_sent: E-mel pengesahan dihantar
      #text displayed before showing a user the email address that we will
      #resend a confirmation email to
      here_is_the_email_colon: |
        Berikut ialah alamat e-mel yang akan kami hantar pengesahan kepada:
      #statement introducing suggestions for users that do no receive confirmation emails
      if_you_do_not_receive_the_email_here_are_tips_colon: |
        Jika anda tidak menerima e-mel, berikut ialah beberapa petua:
      #statement telling users to contact us if they are not receiving confirmation emails
      if_you_are_still_not_receiving_email_contact_us_html: Jika anda masih tidak menerima e-mel pengesahan, sila hubungi kami di <a href="mailto:help+confirmation@inaturalist.org">help@inaturalist.org</a> Jadi kami boleh membantu anda.
      please_add_an_email_and_password: Sila tambah e-mel dan kata laluan supaya anda tidak kehilangan akses kepada akaun anda
      please_click_the_link_sent_to_email_to_confirm_html: Sila klik pautan yang dihantar ke <span class="email">%{email}</span> untuk mengesahkan alamat e-mel anda.
      please_confirm_that_email_is_the_best_contact_html: Sila sahkan bahawa <span class="email">%{email}</span> ialah cara terbaik untuk menghubungi anda. #message requesting users confirm their email address to be able to engage with other users
      please_confirm_to_interact_and_access: Sila sahkan alamat e-mel anda untuk berinteraksi dengan kandungan pengguna lain dan mengakses halaman tertentu. #message requesting that a user confirm their email address, displaying the email to confirm
      please_confirm_your_email_address_html: Sila sahkan alamat e-mel anda <span class="email">%{email}</span>. #statement used in areas that might contain a form allowing users to add comments, etc. This # informs users they must confirm their email address if they want to be able to interact
      please_confirm_to_interact: Sila sahkan alamat e-mel anda untuk berinteraksi dengan kandungan pengguna lain
      #statement used on pages that are not functional unless a user has confirmed their email address
      please_confirm_to_use_this_page: Sila sahkan alamat e-mel anda untuk menggunakan halaman ini
      #tip for users who do not receive confirmation emails to check if their email view is filtered
      tips_check_email_filters: Semak sebarang penapis yang anda buat yang mungkin mengalih keluar e-mel kami daripada peti masuk anda #tip for users who do not receive confirmation emails to check their email spam folder
      tips_check_your_spam_folder: Semak folder spam anda
      your_site_account_has_no_email: Anda %{site_name} akaun tidak mempunyai alamat e-mel yang dikaitkan dengannya.
    guides:
      index:
        funding2_html: |
          Pembiayaan untuk pembangunan Panduan disediakan oleh
          <a href="http://eol.org"><img alt="Encyclopedia of Life" src="%{image_url}"></a>
    messages:
      index:
        #Users cannot create messages if they lack the criteria for
        #earning interaction privilege
        interaction_privilege_notice: |
          Anda akan dapat menghantar mesej baharu selepas anda mengesahkan e-mel anda
          Alamat. Buat masa ini anda boleh membaca dan membalas mesej yang dihantar oleh orang lain kepada anda.
        #Users cannot create messages if they lack the criteria for
        #earning interaction or speech privilege
        privilege_notice: |
          Anda akan dapat menghantar mesej baharu selepas anda mengesahkan e-mel anda
          alamat, dan menambah tiga pemerhatian yang boleh disahkan atau tiga pengenalan
          untuk yang lain. Buat masa ini anda boleh membaca dan membalas mesej yang dihantar oleh orang lain kepada anda.
    observations:
      show:
        #One of a list of requirements an observation must meet to be in the Research Grade category
        dqa_help_research_grade_community_observation_html: |
          yang <strong>Padanan Takson Komuniti dan Takson Pemerhatian</strong>
          (untuk majlis-majlis yang jarang berlaku apabila Takson Pemerhatian boleh menjadi lebih
          khusus daripada Takson Komuniti)
        #One of a list of reasons for an observation to revert to Casual
        dqa_help_casual_not_accurate_evidence_html: |
          Pemerhatian <strong>tidak mengemukakan bukti yang tepat tentang organisma atau
          Adegan</strong> (cth kecerdasan buatan digunakan untuk menambah, mengalih keluar atau menggantikan
          elemen dalam imej atau bunyi. Penyahbunyi bising, penyusunan fokus, atau membuat
          pembetulan kecil seperti mengeluarkan habuk penderia biasanya OK).
    sounds:
      show:
        #The user has been warned that an uploaded sound file has been noted as being problematic.
        #To bypass the warning, this additional text provides a link to the sound and guidance.
        view_original_html: |
          Anda boleh melihat yang asal di <a href="%{url}">%{url}</a>. Tolong
          Biarkan bendera pelanggaran hak cipta sebagai tidak diselesaikan jika bunyi ini berlaku
          melanggar hak cipta.
    taxa:
      edit:
        #a message when you try to save major changes to a taoxn name
        you_can_only_make_minor_changes_to_the_species_epithet_directly_html: |
          Anda hanya boleh membuat perubahan kecil pada julukan spesies secara langsung (cth. perubahan jantina, salah ejaan). Tambah <a target="_blank" href="%{url}">Pertukaran takson</a> jika anda memerlukan perubahan lain pada nama.
      #error message when the Flickr tagger feature fails
      something_went_wrong_tags: |
        Ada yang tidak kena ketika cuba menyiarkan tag tersebut: %{message}
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: Di mana rasa ingin tahu anda menyumbang kepada sains.
          #Hero subheadline describing the core value proposition
          subheadline: >
            Kenal pasti tumbuhan, haiwan, kulat dan banyak lagi sambil menambah atlas hidup kehidupan di Bumi.
          #Primary call-to-action button in the hero section
          cta_join: Sertai komuniti
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: Percuma, bukan untung, dikuasakan oleh komuniti.
        features:
          #Section label introducing the three core user actions
          intro: "Dengan iNaturalist, anda boleh:"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: tumbuhan, haiwan, kulat, & banyak lagi
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: spesies yang pernah anda lihat di seluruh dunia
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: kepada sains sebenar
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: alam semula jadi berdekatan
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: daripada komuniti naturalis global
        stories:
          #Section heading for real-world stories powered by community science
          heading: Kuasa sains komuniti
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: Dilihat oleh %{user} dalam %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: Menemui semula spesies yang telah lama hilang
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            Yang %{moth_common_name} rama-rama tidak dikesan selama beberapa dekad dan pernah dianggap pupus — sehingga seorang pelancong di New Zealand melihatnya secara tidak sengaja.
          #Heading for the story about a new-to-science mantis species
          mantis_heading: Menemui spesies baharu kepada sains
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">Inimia nat</span> — disingkat kepada <span class="italic">I. nat</span> — ialah spesies belalang baharu sains yang ditemui oleh seorang wanita di Australia yang berjalan di kawasan kejiranannya.
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: Melindungi ekosistem tempatan
          #Body text for the amphibian protection story
          amphibian_body: >
            Sekumpulan sukarelawan tempatan di California berkumpul melalui iNaturalist untuk melindungi amfibia yang berhijrah melintasi jalan yang sibuk.
          #Link below the stories to read more community science stories
          read_more: Baca lebih banyak cerita
        observation:
          #Heading for the sample observation section
          heading: Setiap pemerhatian menceritakan kisah
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: pemerhatian yang menyumbang kepada sains biodiversiti
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: spesies yang didokumentasikan di seluruh dunia
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: kertas kerja yang memetik data iNaturalist
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: spesies yang ditemui atau ditemui semula oleh saintis komuniti
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            Buka apl dan ambil gambar mana-mana tumbuhan liar, haiwan, kulat atau organisma lain — dari kawasan kejiranan anda atau di mana-mana sahaja di dunia.
          #Step 2 description — explaining AI and community identification
          step2_body: >
            Apl ini mencadangkan pengenalan serta-merta, dan komuniti naturalis global mengesahkan atau memperhalusinya.
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            Pemerhatian anda menjadi data terbuka — digunakan oleh saintis, ahli pemuliharaan dan penyelidik di seluruh dunia.
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            Alam semula jadi berubah lebih cepat daripada sebelumnya, jadi kita perlukan <span class="underline">awak</span> untuk membantu merekodkan apa yang tinggal di mana.
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            Ia benar-benar membantu saya dengan pengenalpastian spesies, selain memberi saya peluang untuk berinteraksi dengan orang yang berbeza di seluruh dunia.
          #Job title and location of the testimonial author (last name Gube)
          gube_title: Pemuliharaan Marin & Jurugambar Bawah Air, Kenya
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            iNaturalist membuka pintu kepada begitu banyak penyelidikan baharu dan menarik tentang taksa yang kurang dipelajari. Pada pendapat saya, platform ini adalah canggih dalam sains ekologi.
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: Pengarang Panduan Lapangan di Owlfly LLC, Amerika Syarikat
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            iNaturalist dan komuniti pengecamnya yang berdedikasi menjadi sumber yang tidak ternilai dalam penerokaan saya. Ia membantu meletakkan asas kerja semasa saya.
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: Penyelidik Biodiversiti, Sri Lanka
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist ialah alat berkuasa yang menghubungkan orang, alam semula jadi dan pengetahuan. Saya boleh mengambil gambar spesies yang jarang ditemui, atau bahkan spesies yang belum diterangkan, dan pada masa yang sama, saya menyumbang kepada pemuliharaan warisan semula jadi kita.
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: Juruteknik Alam Sekitar dan jurugambar hobi, Brazil
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            Tidak kira di mana sahaja anda berada, sama ada anda mempunyai PhD atau hanya suka aktiviti luar, iNaturalist akan membawa anda lebih dekat dengan alam semula jadi dan ramai rakan naturalis.
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: Ahli biologi, Mexico
        everyone:
          #Heading for the broad audience section
          heading: Setiap orang adalah seorang naturalis
          #Description inviting anyone who has been curious about a living thing
          body: >
            Jika anda pernah melihat dengan teliti sesuatu yang hidup dan tertanya-tanya apa itu, iNaturalist adalah untuk anda.
          #Heading for the impact sub-section
          impact_heading: Anda boleh memberi impak
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            Setiap foto yang anda kongsi menjadi sebahagian daripada rekod saintifik global yang bergantung kepada penyelidik di seluruh dunia.
          #Heading for the community reputation sub-section
          community_heading: '"Tempat paling bagus dalam talian"'
          community_heading_2: Tempat terbaik dalam talian
          #Description of the welcoming community aspect
          community_body: >
            Datang untuk pengenalan, tinggal untuk komuniti dan memberi kesan kepada sains.
        download:
          #Heading prompting users to download the mobile app
          heading: Muat turun apl iNaturalist
          #Subheading describing the two core benefits of the app
          subheading: Dapatkan pengenalan masa nyata & menyumbang kepada sains
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ Muat turun"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: Terokai spesies di seluruh dunia
          #Button / link to browse species without downloading
          button: Terokai sekarang
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "Di bawah 13 tahun? Muat turun Cari!"
          #Description of Seek's badge and challenge features
          body: Dapatkan lencana dan ambil bahagian dalam cabaran untuk memerhati spesies!
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ Ulasan 5 Bintang"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: Dapatkan surat berita bulanan kami!
          #Description of the newsletter's content
          body: Kekal berhubung dengan cerita dan penemuan daripada komuniti iNaturalist.
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist ialah organisasi bukan untung yang menyokong sains dan pemuliharaan.
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: Sokongan anda menjadikannya mungkin.
          #Call-to-action button for the donation section
          cta: Derma sekarang
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: Soalan Lazim
          #FAQ: uploading existing photos — question
          upload_existing_question: Bolehkah saya memuat naik foto yang sudah saya miliki?
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            Ya! Selagi anda tahu secara kasar bila dan di mana gambar diambil, gambar lama dialu-alukan.
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: Siapa yang boleh melakukan sains dengan pemerhatian iNaturalis?
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            Sesiapa sahaja! Semua pemerhatian iNaturalist terbuka dan tersedia secara percuma — kepada penyelidik, pengamal pemuliharaan dan individu yang ingin tahu.
          #FAQ: research grade definition — question
          research_grade_question: Apakah maksud "gred penyelidikan"?
          #FAQ: research grade definition — answer
          research_grade_answer: >
            Apabila komuniti bersetuju dengan pengenalan, pemerhatian menjadi "gred penyelidikan" dan memasuki rekod saintifik global. Setiap pengenalan boleh membantu mendapatkannya ke sana.
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: Adakah saya perlu tahu apa yang saya lihat?
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            Langsung tidak! Kongsi foto, dan komuniti naturalis global boleh membantu anda mengenal pastinya.
          #FAQ: whether the app is required — question
          need_app_question: Adakah saya perlu menggunakan apl ini?
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            Pada desktop, iNaturalist.org berfungsi dengan baik. Pada peranti mudah alih, apl ini memberikan anda pengalaman terbaik — terutamanya untuk mengenal pasti spesies semasa dalam perjalanan.
