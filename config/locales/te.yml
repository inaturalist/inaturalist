  views:
    announcements:
      locales_desc: |
        మల్టిపుల్ ఎంచుకోవడం కొరకు CMD- లేదా SHIFT-క్లిక్ చేయండి. "అన్నీ" ఎంచుకోవడం లేదా చేయకపోవడం
        ఒక ఎంపిక దీనితో సంబంధం లేకుండా వినియోగదారులందరికీ ప్రకటనను చూపుతుంది
        లోకల్.. ఒక ప్రాంతం లేని భాషను ఎంచుకోవడం *లక్ష్యం కాదు*
        ప్రాంతాలతో కూడిన ప్రదేశాలు, ఉదా: మీరు ఇంగ్లిష్ ఎంచుకుంటే అది కనిపించదు
        ఇంగ్లిష్ (యుకె) ఎంచుకున్న వ్యక్తుల కోసం.
      clients_desc: |
        మల్టిపుల్ ఎంచుకోవడం కొరకు CMD- లేదా SHIFT-క్లిక్ చేయండి. "అన్నీ" ఎంచుకోవడం లేదా చేయకపోవడం
        ఒక ఎంపిక దీనితో సంబంధం లేకుండా వినియోగదారులందరికీ ప్రకటనను చూపుతుంది
        క్లయింట్.
      end_desc: |
        మీ ఖాతా టైమ్ జోన్ లో ఈ ప్రకటన ఆగిపోతుంది
        కనిపిస్తుంది. టైమ్ జోన్లలో వర్తిస్తుంది, కాబట్టి ప్రతి ఒక్కరూ చూడటం మానేస్తారు
        అదే సమయంలో, వారి స్థానిక కాలానికి సంబంధించినది కాదు.
      excludes_non_site_desc: |
        మీ ప్రకటన ఒక సైట్ ను లక్ష్యంగా చేసుకున్నట్లయితే (మీరు ఒకవేళ డిఫాల్ట్ అయితే)
        సైట్ అడ్మిన్), ఇది అన్ని సైట్ లను లక్ష్యంగా చేసుకునే ప్రకటనలను మినహాయిస్తుంది
        ఈ స్థానం..
      ip_countries_desc: |
        మల్టిపుల్ ఎంచుకోవడం కొరకు CMD- లేదా SHIFT-క్లిక్ చేయండి. "అన్నీ" ఎంచుకోవడం లేదా చేయకపోవడం
        ఒక ఎంపిక దీనితో సంబంధం లేకుండా వినియోగదారులందరికీ ప్రకటనను చూపుతుంది
        ఐపి దేశం.
      exclude_ip_countries_desc: |
        మల్టిపుల్ సెలెక్ట్ చేయడానికై CMD- లేదా షిఫ్ట్-క్లిక్ చేయండి. ఎంపిక చేయబడ్డ దేశాలు చూపించబడవు
        ప్రకటన. ఒకవేళ IP దేశాలు ఎంచుకోబడితే, IP దేశాలను మినహాయించండి
        మొదటి నుంచి తీసివేయబడుతుంది.
      #Note about how the announcement last observation date property works
      last_observation_date_desc: |
        యూజర్ ఇటీవల సృష్టించిన దాని సృష్టి తేదీ గురించి గమనించండి
        పరిశీలన రహస్యంగా ఉంది, కాబట్టి లక్ష్యంగా చేసుకోవడానికి కొన్ని గంటలు పట్టవచ్చు
        ప్రభావం చూపండి
      observation_oauth_application_ids_desc: |
        మల్టిపుల్ ఎంచుకోవడం కొరకు CMD- లేదా SHIFT-క్లిక్ చేయండి. "అన్నీ" ఎంచుకోవడం లేదా చేయకపోవడం
        ఒక ఎంపిక దీనితో సంబంధం లేకుండా వినియోగదారులందరికీ ప్రకటనను చూపుతుంది
        యాప్..
      site_ids_desc: |
        మల్టిపుల్ ఎంచుకోవడం కొరకు CMD- లేదా SHIFT-క్లిక్ చేయండి. "అన్నీ" ఎంచుకోవడం లేదా చేయకపోవడం
        ఒక ఎంపిక దీనితో సంబంధం లేకుండా వినియోగదారులందరికీ ప్రకటనను చూపుతుంది
        సైట్ అనుబంధం.
      start_desc: |
        మీ ఖాతా టైమ్ జోన్ లో ఈ ప్రకటన ప్రారంభమవుతుంది
        కనిపిస్తుంది. టైమ్ జోన్లలో వర్తిస్తుంది, కాబట్టి ప్రతి ఒక్కరూ చూడటం ప్రారంభిస్తారు
        అదే సమయంలో, వారి స్థానిక కాలానికి సంబంధించినది కాదు.
      #Description of a group of options for targeting announcements based
      #on donation behavior
      target_users_by_donation_behavior: విరాళాల ప్రవర్తన ద్వారా వినియోగదారులను లక్ష్యంగా చేసుకోండి
      #Description of a group of options for targeting announcements based
      #on identification behavior
      target_users_by_identification_behavior: గుర్తింపు ప్రవర్తన ద్వారా వినియోగదారులను లక్ష్యంగా చేసుకోండి
      #Description of a group of options for targeting announcements based
      #on observation behavior
      target_users_by_observation_behavior: పరిశీలన ప్రవర్తన ద్వారా వినియోగదారులను లక్ష్యంగా చేసుకోండి
      #Description of a group of options for targeting announcements based
      #miscellaneous user attributes
      target_users_by_other_attributes: ఇతర లక్షణాల ద్వారా యూజర్లను టార్గెట్ చేయండి
    email_confirmation:
      click_here_to_resend_a_confirmation_email: ధృవీకరణ ఇమెయిల్ ని తిరిగి పంపడానికి ఇక్కడ క్లిక్ చేయండి
      #message displayed after users trigger sending a email to confirm their email address
      confirmation_email_sent: ధృవీకరణ ఇమెయిల్ పంపబడింది
      #text displayed before showing a user the email address that we will
      #resend a confirmation email to
      here_is_the_email_colon: |
        ధృవీకరణను మేము పంపే ఇమెయిల్ చిరునామా ఇక్కడ ఉంది:
      #statement introducing suggestions for users that do no receive confirmation emails
      if_you_do_not_receive_the_email_here_are_tips_colon: |
        మీరు ఇమెయిల్ అందుకోకపోతే, ఇక్కడ కొన్ని చిట్కాలు ఉన్నాయి:
      #statement telling users to contact us if they are not receiving confirmation emails
      if_you_are_still_not_receiving_email_contact_us_html: ఒకవేళ మీరు ఇంకా ధృవీకరణ ఇమెయిల్ ని అందుకోనట్లయితే, దయచేసి మమ్మల్ని సంప్రదించండి <a href="mailto:help+confirmation@inaturalist.org">help@inaturalist.org</a> కాబట్టి మేము మీకు సహాయపడగలము.
      please_add_an_email_and_password: దయచేసి ఇమెయిల్ మరియు పాస్ వర్డ్ జోడించండి, తద్వారా మీరు మీ ఖాతాకు ప్రాప్యతను కోల్పోరు
      please_click_the_link_sent_to_email_to_confirm_html: పంపిన లింక్ పై క్లిక్ చేయండి <span class="email">%{email}</span> మీ ఇమెయిల్ చిరునామాను ధృవీకరించడానికి.
      please_confirm_that_email_is_the_best_contact_html: దయచేసి దీనిని ధృవీకరించండి <span class="email">%{email}</span> మిమ్మల్ని సంప్రదించడానికి ఉత్తమ మార్గం. #message requesting users confirm their email address to be able to engage with other users
      please_confirm_to_interact_and_access: ఇతర వినియోగదారుల కంటెంట్ తో ఇంటరాక్ట్ అవ్వడానికి మరియు నిర్ధిష్ట పేజీలను యాక్సెస్ చేయడానికి దయచేసి మీ ఇమెయిల్ చిరునామాను ధృవీకరించండి. #message requesting that a user confirm their email address, displaying the email to confirm
      please_confirm_your_email_address_html: దయచేసి మీ ఇమెయిల్ చిరునామాను ధృవీకరించండి <span class="email">%{email}</span>. #statement used in areas that might contain a form allowing users to add comments, etc. This # informs users they must confirm their email address if they want to be able to interact
      please_confirm_to_interact: ఇతర వినియోగదారుల కంటెంట్ తో ఇంటరాక్ట్ అవ్వడం కొరకు దయచేసి మీ ఇమెయిల్ చిరునామాను ధృవీకరించండి
      #statement used on pages that are not functional unless a user has confirmed their email address
      please_confirm_to_use_this_page: ఈ పేజీని ఉపయోగించడం కొరకు దయచేసి మీ ఇమెయిల్ చిరునామాను ధృవీకరించండి
      #tip for users who do not receive confirmation emails to check if their email view is filtered
      tips_check_email_filters: మీ ఇన్ బాక్స్ నుండి మా ఇమెయిల్ లను తొలగించే ఏవైనా ఫిల్టర్ లను మీరు తయారు చేశారా అని తనిఖీ చేయండి #tip for users who do not receive confirmation emails to check their email spam folder
      tips_check_your_spam_folder: మీ స్పామ్ ఫోల్డర్ ను తనిఖీ చేయండి
      your_site_account_has_no_email: నీ %{site_name} ఖాతాకు ఎటువంటి ఇమెయిల్ చిరునామా అసోసియేట్ చేయబడలేదు.
    guides:
      index:
        funding2_html: |
          గైడ్స్ అభివృద్ధికి నిధులు అందించింది
          <a href="http://eol.org"><img alt="Encyclopedia of Life" src="%{image_url}"></a>
    messages:
      index:
        #Users cannot create messages if they lack the criteria for
        #earning interaction privilege
        interaction_privilege_notice: |
          మీరు మీ ఇమెయిల్ ను ధృవీకరించిన తరువాత మీరు కొత్త సందేశాలను పంపగలుగుతారు
          చిరునామా. ప్రస్తుతానికి ఇతరులు మీకు పంపే సందేశాన్ని మీరు చదవవచ్చు మరియు ప్రతిస్పందించవచ్చు.
        #Users cannot create messages if they lack the criteria for
        #earning interaction or speech privilege
        privilege_notice: |
          మీరు మీ ఇమెయిల్ ను ధృవీకరించిన తరువాత మీరు కొత్త సందేశాలను పంపగలుగుతారు
          చిరునామా, మరియు మూడు ధృవీకరించదగిన పరిశీలనలు లేదా మూడు గుర్తింపులను జోడించింది
          ఇతరుల కోసం.. ప్రస్తుతానికి ఇతరులు మీకు పంపే సందేశాన్ని మీరు చదవవచ్చు మరియు ప్రతిస్పందించవచ్చు.
    observations:
      show:
        #One of a list of requirements an observation must meet to be in the Research Grade category
        dqa_help_research_grade_community_observation_html: |
          ది <strong>కమ్యూనిటీ టాక్సాన్ మరియు అబ్జర్వేషన్ టాక్సాన్ మ్యాచ్ అవుతాయి</strong>
          (అబ్జర్వేషన్ టాక్సాన్ ఎక్కువగా ఉండే అరుదైన సందర్భాల్లో
          కమ్యూనిటీ టాక్సాన్ కంటే నిర్దిష్టమైనది)
        #One of a list of reasons for an observation to revert to Casual
        dqa_help_casual_not_accurate_evidence_html: |
          పరిశీలన <strong>జీవికి సంబంధించిన ఖచ్చితమైన సాక్ష్యాలను అందించకపోవడం లేదా
          దృశ్యం</strong> (ఉదా. జోడించడానికి, తొలగించడానికి లేదా భర్తీ చేయడానికి కృత్రిమ మేధస్సు ఉపయోగించబడింది
          ఇమేజ్ లేదా ధ్వనిలోని మూలకాలు. డినాయిజింగ్ చేయడం, ఫోకస్ స్టాకింగ్ లేదా మేకింగ్ చేయడం
          సెన్సార్ ధూళిని తొలగించడం వంటి చిన్న పరిష్కారాలు సాధారణంగా సరే).
    sounds:
      show:
        #The user has been warned that an uploaded sound file has been noted as being problematic.
        #To bypass the warning, this additional text provides a link to the sound and guidance.
        view_original_html: |
          మీరు ఒరిజినల్ ని ఇక్కడ చూడవచ్చు <a href="%{url}">%{url}</a>. దయచేసి
