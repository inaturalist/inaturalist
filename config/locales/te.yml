          కాపీరైట్ ఉల్లంఘన.
    taxa:
      edit:
        #a message when you try to save major changes to a taoxn name
        you_can_only_make_minor_changes_to_the_species_epithet_directly_html: |
          మీరు జాతి విశేషణంలో నేరుగా చిన్న మార్పులు మాత్రమే చేయవచ్చు (ఉదా. లింగ మార్పులు, స్పెల్లింగ్ తప్పు). జోడించండి <a target="_blank" href="%{url}">టాక్సాన్ మార్పిడి</a> మీకు పేరుకు ఇతర మార్పులు అవసరమైతే.
      #error message when the Flickr tagger feature fails
      something_went_wrong_tags: |
        ఆ ట్యాగ్ లను పోస్ట్ చేయడానికి ప్రయత్నించడంలో ఏదో తప్పు జరిగింది: %{message}
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: మీ ఉత్సుకత సైన్సుకు దోహదం చేస్తుంది.
          #Hero subheadline describing the core value proposition
          subheadline: >
            భూమిపై జీవితం యొక్క సజీవ అట్లాస్ కు జోడించేటప్పుడు మొక్కలు, జంతువులు, శిలీంధ్రాలు మరియు మరెన్నో గుర్తించండి.
          #Primary call-to-action button in the hero section
          cta_join: కమ్యూనిటీలో చేరండి
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: ఉచిత, లాభాపేక్షలేని, కమ్యూనిటీ-పవర్డ్.
        features:
          #Section label introducing the three core user actions
          intro: "ఐనేచురలిస్ట్ తో, మీరు వీటిని చేయవచ్చు:"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: మొక్కలు, జంతువులు, శిలీంధ్రాలు మరియు మరిన్ని
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: మీరు ప్రపంచవ్యాప్తంగా చూసిన జాతులు
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: నిజమైన విజ్ఞాన శాస్త్రానికి
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: సమీపంలోని ప్రకృతి
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: ప్రకృతి శాస్త్రవేత్తల ప్రపంచ సమాజం నుండి
        stories:
          #Section heading for real-world stories powered by community science
          heading: కమ్యూనిటీ సైన్స్ యొక్క శక్తి
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: వీరిచే చూసినవారు %{user} లో %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: దీర్ఘకాలంగా కోల్పోయిన జాతులను తిరిగి కనుగొనడం
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            ది %{moth_common_name} చిమ్మట దశాబ్దాలుగా గుర్తించబడలేదు మరియు ఒకప్పుడు అంతరించిపోయిందని భావించబడింది - న్యూజిలాండ్ లోని ఒక పర్యాటకుడు అనుకోకుండా దానిని గుర్తించే వరకు.
          #Heading for the story about a new-to-science mantis species
          mantis_heading: కొత్త-నుండి-సైన్స్ జాతులను కనుగొనడం
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">ఇనిమియా నాట్</span> - సంక్షిప్తంగా <span class="italic">I. నాట్</span> - ఆస్ట్రేలియాలో ఒక మహిళ తన పరిసరాల్లో నడుస్తున్న కొత్త-నుండి-సైన్స్ మాంటిస్ జాతి.
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: స్థానిక పర్యావరణ వ్యవస్థలను రక్షించడం
          #Body text for the amphibian protection story
          amphibian_body: >
            కాలిఫోర్నియాలోని స్థానిక వాలంటీర్ల బృందం బిజీగా ఉన్న రహదారిని దాటే వలస ఉభయచరాలను రక్షించడానికి ఐనేచురలిస్ట్ ద్వారా కలిసి వచ్చింది.
          #Link below the stories to read more community science stories
          read_more: మరిన్ని కథలు చదవండి
        observation:
          #Heading for the sample observation section
          heading: ప్రతి పరిశీలన ఒక కథను చెబుతుంది
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: జీవవైవిధ్య శాస్త్రానికి దోహదపడే పరిశీలనలు
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: ప్రపంచవ్యాప్తంగా డాక్యుమెంట్ చేయబడిన జాతులు
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: ఐనేచురలిస్ట్ డేటాను ఉటంకిస్తూ పేపర్లు
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: కమ్యూనిటీ శాస్త్రవేత్తలు కనుగొన్న లేదా తిరిగి కనుగొన్న జాతులు
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            అనువర్తనాన్ని తెరిచి, ఏదైనా అడవి మొక్క, జంతువు, శిలీంధ్రాలు లేదా ఇతర జీవిని ఫోటో తీయండి - మీ పొరుగు ప్రాంతం నుండి లేదా ప్రపంచంలో ఎక్కడైనా ఉండండి.
          #Step 2 description — explaining AI and community identification
          step2_body: >
            అనువర్తనం తక్షణమే గుర్తింపును సూచిస్తుంది మరియు ప్రకృతి శాస్త్రవేత్తల ప్రపంచ సంఘం దానిని నిర్ధారిస్తుంది లేదా శుద్ధి చేస్తుంది.
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            మీ పరిశీలన ఓపెన్ డేటాగా మారుతుంది - ప్రపంచవ్యాప్తంగా శాస్త్రవేత్తలు, పరిరక్షణవాదులు మరియు పరిశోధకులు ఉపయోగిస్తారు.
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            ప్రకృతి గతంలో కంటే వేగంగా మారుతోంది, కాబట్టి మనకు అవసరం <span class="underline">మీరు</span> ఎక్కడ నివసిస్తున్నారో రికార్డ్ చేయడంలో సహాయపడటానికి.
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            ప్రపంచవ్యాప్తంగా ఉన్న వివిధ వ్యక్తులతో సంభాషించే అవకాశాన్ని ఇవ్వడంతో పాటు, జాతుల గుర్తింపుకు ఇది నిజంగా నాకు సహాయపడింది.
          #Job title and location of the testimonial author (last name Gube)
          gube_title: మెరైన్ కన్జర్వేషనిస్ట్ & అండర్వాటర్ ఫోటోగ్రాఫర్, కెన్యా
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            iNaturalist తక్కువ అధ్యయనం చేసిన టాక్సాపై చాలా కొత్త మరియు ఉత్తేజకరమైన పరిశోధనకు తలుపులు తెరుస్తుంది. నా అభిప్రాయం ప్రకారం, ఈ వేదిక పర్యావరణ శాస్త్రం యొక్క అత్యాధునికమైనది.
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: ఔల్ఫ్లీ ఎల్ ఎల్ సి, యుఎస్ఎలో ఫీల్డ్ గైడ్ రచయిత
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            ఐనేచురలిస్ట్ మరియు దాని అంకితమైన గుర్తింపు సంఘం నా అన్వేషణలలో అమూల్యమైన వనరుగా మారింది. ఇది నా ప్రస్తుత పనికి పునాది వేయడానికి సహాయపడింది.
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: జీవవైవిధ్య పరిశోధకుడు, శ్రీలంక
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist అనేది ప్రజలు, ప్రకృతి మరియు జ్ఞానాన్ని కలిపే శక్తివంతమైన సాధనం. నేను ఒక అరుదైన జాతిని ఫోటో తీయగలను, లేదా ఇంకా వివరించని ఒకటి కూడా, మరియు అదే సమయంలో, మన సహజ వారసత్వాన్ని పరిరక్షించడానికి నేను దోహదం చేస్తాను.
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: ఎన్విరాన్మెంటల్ టెక్నీషియన్ మరియు హాబీ ఫోటోగ్రాఫర్, బ్రెజిల్
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            మీరు ప్రపంచంలో ఎక్కడ ఉన్నా, మీకు పిహెచ్ డి ఉన్నా లేదా ఆరుబయట ప్రేమిస్తున్నా, iNaturalist మిమ్మల్ని ప్రకృతికి మరియు చాలా మంది తోటి ప్రకృతి వాదులకు దగ్గరగా తీసుకువస్తుంది.
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: జీవశాస్త్రవేత్త, మెక్సికో
        everyone:
          #Heading for the broad audience section
          heading: ప్రతి ఒక్కరూ ప్రకృతి శాస్త్రవేత్త
          #Description inviting anyone who has been curious about a living thing
          body: >
            మీరు ఎప్పుడైనా సజీవమైన దాన్ని నిశితంగా చూసి, అది ఏమిటో ఆశ్చర్యపోతే, iNaturalist మీ కోసం.
          #Heading for the impact sub-section
          impact_heading: మీరు ప్రభావం చూపవచ్చు
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            మీరు పంచుకునే ప్రతి ఫోటో ప్రపంచవ్యాప్తంగా పరిశోధకులు ఆధారపడే గ్లోబల్ సైంటిఫిక్ రికార్డులో భాగం అవుతుంది.
          #Heading for the community reputation sub-section
          community_heading: '"ఆన్ లైన్ లో చక్కని ప్రదేశం"'
          community_heading_2: ఆన్ లైన్ లో చక్కని ప్రదేశం
          #Description of the welcoming community aspect
          community_body: >
            గుర్తింపుల కోసం రండి, సమాజం కోసం ఉండండి మరియు సైన్స్ పై ప్రభావం చూపండి.
        download:
          #Heading prompting users to download the mobile app
          heading: ఐనేచురలిస్ట్ యాప్ ని డౌన్ లోడ్ చేసుకోండి
          #Subheading describing the two core benefits of the app
          subheading: నిజ-సమయ గుర్తింపులను పొందండి మరియు సైన్స్కు దోహదం చేయండి
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ డౌన్లోడ్లు"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: ప్రపంచవ్యాప్తంగా జాతులను అన్వేషించండి
          #Button / link to browse species without downloading
          button: ఇప్పుడే అన్వేషించండి
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "13 ఏళ్లలోపు ? డౌన్ లోడ్ అన్వేషణ!"
          #Description of Seek's badge and challenge features
          body: బ్యాడ్జీలను సంపాదించండి మరియు జాతులను పరిశీలించడానికి సవాళ్లలో పాల్గొనండి!
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ 5-స్టార్ సమీక్షలు"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: మా నెలవారీ వార్తాలేఖను పొందండి!
          #Description of the newsletter's content
          body: iNaturalist కమ్యూనిటీ నుండి కథలు మరియు ఆవిష్కరణలతో కనెక్ట్ అవ్వండి.
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist అనేది సైన్స్ మరియు పరిరక్షణకు మద్దతు ఇచ్చే లాభాపేక్షలేని సంస్థ.
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: మీ మద్దతు అది సాధ్యమవుతుంది.
          #Call-to-action button for the donation section
          cta: ఇప్పుడే విరాళం ఇవ్వండి
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: తరచుగా అడిగే ప్రశ్నలు
          #FAQ: uploading existing photos — question
          upload_existing_question: నా వద్ద ఇప్పటికే ఉన్న ఫోటోలను నేను అప్ లోడ్ చేయవచ్చా?
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            అవును! ఫోటో ఎప్పుడు, ఎక్కడ తీయారో మీకు సుమారుగా తెలిసినంతవరకు, పాత ఫోటోలు స్వాగతించబడతాయి.
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: ఐనేచురలిస్ట్ పరిశీలనలతో సైన్స్ ఎవరు చేయగలరు?
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            ఎవరైనా! అన్ని ఐనేచురలిస్ట్ పరిశీలనలు బహిరంగంగా మరియు ఉచితంగా అందుబాటులో ఉంటాయి - పరిశోధకులు, పరిరక్షణ అభ్యాసకులు మరియు ఆసక్తిగల వ్యక్తులకు.
          #FAQ: research grade definition — question
          research_grade_question: '"రీసెర్చ్ గ్రేడ్" అంటే ఏమిటి?'
          #FAQ: research grade definition — answer
          research_grade_answer: >
            సమాజం ఒక గుర్తింపుపై అంగీకరించినప్పుడు, ఒక పరిశీలన "పరిశోధన గ్రేడ్" అవుతుంది మరియు ప్రపంచ శాస్త్రీయ రికార్డులోకి ప్రవేశిస్తుంది. ప్రతి గుర్తింపు దానిని అక్కడికి తీసుకురావడానికి సహాయపడుతుంది.
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: నేను ఏమి చూస్తున్నానో తెలుసుకోవాల్సిన అవసరం ఉందా?
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            అస్సలు కాదు! ఒక ఫోటోను భాగస్వామ్యం చేయండి మరియు ప్రకృతి శాస్త్రవేత్తల ప్రపంచ సంఘం దానిని గుర్తించడంలో మీకు సహాయపడుతుంది.
          #FAQ: whether the app is required — question
          need_app_question: నేను యాప్ ని ఉపయోగించాలా?
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            డెస్క్ టాప్ లో, iNaturalist.org గొప్పగా పనిచేస్తుంది. మొబైల్ పరికరంలో, అనువర్తనం మీకు ఉత్తమ అనుభవాన్ని ఇస్తుంది - ముఖ్యంగా ప్రయాణంలో జాతులను గుర్తించడానికి.
