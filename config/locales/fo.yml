  views:
    welcome_v2:
      index:
        hero:
          #Main hero headline on the home page
          headline: Har tín forvitni stuðlar vísindunum.
          #Hero subheadline describing the core value proposition
          #TODO: test that line break here doesn't cause line break
          subheadline: >
            Eyðmerkja plantur, djór, soppir og annað, meðan tú leggur afturat einum livandi atlas av lívi á jørðini.
          #Primary call-to-action button in the hero section
          cta_join: Ver við í felagsskapinum
          #Tagline displayed beneath the hero CTA, emphasising the app's accessibility
          tagline: Ókeypis, ikki-fíggjarligt, samfelagsdrivið.
        features:
          #Section label introducing the three core user actions
          intro: "Við iNaturalist kanst tú:"
          #Description of what users can Identify
          #Read as "{Identify} plants, animals, fungi, & more"
          identify_desc: Plantur, djór, soppur og meira
          #Description of what users can Track
          #Read as "{Track} species you've seen worldwide"
          track_desc: Sløg, tú hevur sæð kring allan heimin
          #Description of where users can Contribute
          #Read as "{Contribute} to real science"
          contribute_desc: Til veruliga vísindi
          #Description of what users can Discover
          #Read as "{Discover} nature nearby"
          discover_desc: Náttúra nærhendis
          #Description of what users can Learn
          #Read as "{Learn} from a global community of naturalists"
          learn_desc: Frá einum altjóða felagsskapi av náttúrufrøðingum
        stories:
          #Section heading for real-world stories powered by community science
          heading: Styrkin í samfelagsvísindum
          #Photo credit for each community-science story card; %{user} = observer login, %{place} = display place name
          observation_credit: Sæð av %{user} í %{place}
          #Heading for the story about rediscovering an extinct moth species
          moth_heading: Enduruppdaging av leingi horvnum sløgum
          #Body text for the moth rediscovery story; %{moth_common_name} = common name of the moth from JSON
          moth_body: >
            The %{moth_common_name} Mølur var ikki sæddur í áratíggju og varð einaferð hildin at vera útdoyddur — inntil ein ferðamaður í Ný Sælandi sá hana av tilvild.
          #Heading for the story about a new-to-science mantis species
          mantis_heading: At finna nýggj sløg innan vísindini
          #Body text for the mantis discovery story
          mantis_body_html: >
            <span class="italic">Inimia nat</span> — stytt til <span class="italic">Eg. Nat</span> — er ein nýggj mantis-ætt, sum ein kvinna í Avstralia hevur funnið í sínum grannalagi.
          #Heading for the story about volunteers protecting amphibians
          amphibian_heading: Vernd av lokalum lívfrøðiligum økjum
          #Body text for the amphibian protection story
          amphibian_body: >
            Ein bólkur av lokalum sjálvbodnum í Kalifornia savnaðist gjøgnum iNaturalist fyri at verja flúgvandi amfibium, sum ganga yvir ein nógv brúktan veg.
          #Link below the stories to read more community science stories
          read_more: Les fleiri søgur
        observation:
          #Heading for the sample observation section
          heading: Hvør eygleiðing sigur eina søgu
        stats:
          #Description label for the observations statistic
          #Prepended by count, e.g. "350M+ observations contributing to biodiversity science"
          observations_label: Eygleiðingar, sum geva sítt íkast til lívfrøðiliga fjølbroytnivísindi
          #Description label for the species statistic
          #Prepended by count, e.g. "550,000+ species documented across the globe"
          species_label: Sløg, sum eru skrásett kring allan heimin
          #Description label for the papers statistic
          #Prepended by count, e.g. "7,000+ papers citing iNaturalist data"
          papers_label: greinar, sum vísa til iNaturalist dátur
          #Description label for the discoveries statistic
          #Prepended by count, e.g. "500+ species discovered or rediscovered by community scientists"
          discoveries_label: Sløg, sum eru funnin ella enduruppdagað av samfelagsvísindafólkum
        how:
          #Step 1 description — instructing users to photograph any organism
          step1_body: >
            Lat appina upp og tak myndir av øllum villum plantum, djórum, soppum ella øðrum lívverum — úr tínum grannalagi ella hvar sum helst í heiminum.
          #Step 2 description — explaining AI and community identification
          step2_body: >
            Appin leggur fram eina eyðmerking beinanvegin, og ein altjóða felagsskapur av náttúrufrøðingum váttar ella betrar hana.
          #Step 3 description — explaining how observations become open scientific data
          step3_body: >
            Tín eygleiðing gerst opin dátur — nýtt av vísindafólki, verndarfólki og granskarum kring heimin.
          #Explanatory note below the three steps giving the "why" behind contributing
          why_note_html: >
            Náttúran broytist skjótari enn nakrantíð, so vit mugu <span class="underline">Tú</span> at hjálpa við at skráseta, hvat býr hvar.
        testimonials:
          #Quote from the testimonial author (last name Gube)
          gube_quote: >
            Tað hevur veruliga hjálpt mær við at eyðmerkja sløg, umframt at geva mær møguleika at samskifta við ymisk fólk kring heimin.
          #Job title and location of the testimonial author (last name Gube)
          gube_title: Havverndarfólk og undirvatnsfotografur, Kenya
          #Quote from the testimonial author (last name Kratzer)
          kratzer_quote: >
            iNaturalist letur dyrnar upp fyri so nógvari nýggjari og spennandi gransking um lítið kannað sløg. Eftir mínum tykki er henda pallur fremsta økið innan vistfrøðiliga vísindi.
          #Job title and location of the testimonial author (last name Kratzer)
          kratzer_title: Field Guide høvundur hjá Owlfly LLC, USA
          #Quote from the testimonial author (last name Sumanapala)
          sumanapala_quote: >
            iNaturalist og teirra trúføstu felagsskapur av identifikatiónum gjørdust ein ómetandi kelda í mínum kanningum. Tað hjálpti at leggja grundarlagið fyri mítt núverandi arbeiði.
          #Job title and location of the testimonial author (last name Sumanapala)
          sumanapala_title: Lívfrøðiligur fjølbroytingargranskari, Sri Lanka
          #Quote from the testimonial author (last name Fachetti)
          fachetti_quote: >
            iNaturalist er eitt sterkt amboð, sum knýtir fólk, náttúru og vitan saman. Eg kann taka myndir av einum sjáldsomum slagi, ella kanska einum, sum enn ikki er lýst, og samstundis leggi eg mítt til at varðveita okkara náttúruarv.
          #Job title and location of the testimonial author (last name Fachetti)
          fachetti_title: Umhvørvisteknikari og áhugafotografur, Brasil
          #Quote from the testimonial author (last name Velazco)
          velazco_quote: >
            Óansæð hvar í heiminum tú ert, um tú hevur PhD ella bara elskar náttúruna, fer iNaturalist at føra teg nærri náttúruni og mongum øðrum náttúruvísindafólkum.
          #Job title and location of the testimonial author (last name Velazco)
          velazco_title: Lívfrøðingur, Meksiko
        everyone:
          #Heading for the broad audience section
          heading: Øll eru náttúruvísindafólk
          #Description inviting anyone who has been curious about a living thing
          body: >
            Um tú nakrantíð hevur hugt nærri at livandi og undrast á, hvat tað var, so er iNaturalist nakað fyri teg.
          #Heading for the impact sub-section
          impact_heading: Tú kanst gera mun
          #Description of how each photo contributes to the global scientific record
          impact_body: >
            Hvør mynd, tú deilir, verður partur av einum altjóða vísindaligum skjali, sum granskarar kring heimin eru bundnir at.
          #Heading for the community reputation sub-section
          community_heading: '"Tað fínasta staðið á netinum"'
          #Description of the welcoming community aspect
          community_body: >
            Kom fyri eyðmerkingarnar, ver verandi fyri samfelagið og ávirkan á vísindi.
        download:
          #Heading prompting users to download the mobile app
          heading: Tak niður iNaturalist appina
          #Subheading describing the two core benefits of the app
          subheading: Fá raðfestar eyðmerkingar og lat til vísindini
          #Social proof label showing total app downloads
          #%{count} = formatted and rounded number of downloads. The plus (+) reflects there being more than that number.
          count_label: "%{count}+ Niðurhal"
        explore:
          #Heading for the explore species section; species cards generated from static JSON exported from iNat
          heading: Kanna sløg kring heimin
          #Button / link to browse species without downloading
          button: Kanna nú
        seek:
          #Heading for the Seek app section, aimed at users under 13
          heading: "Undir 13? Download Seek!"
          #Description of Seek's badge and challenge features
          body: Fá merki og tak lut í avbjóðingum fyri at eygleiða djórasløg!
          #Review count social proof label for the app
          #%{count} = formatted and rounded number of 5-star reviews. The plus (+) reflects there being more than that number.
          review_tagline: "%{count}+ 5-stjørna ummæli"
        newsletter:
          #Heading inviting users to subscribe to the monthly newsletter
          heading: Fá okkara mánaðarliga tíðindabræv!
          #Description of the newsletter's content
          body: Ver knýttur at søgum og uppdagingum frá iNaturalist-samfelagnum.
        donate:
          #Heading describing iNaturalist's nonprofit status
          heading: iNaturalist er ein ikki-fíggjarligur felagsskapur, sum stuðlar vísindum og varðveitslu.
          #Supporting line connecting the user's donation to iNaturalist's mission of supporting science and conservation.
          subheading: Tín stuðul ger tað møguligt.
          #Call-to-action button for the donation section
          cta: Gevið nú
        faq:
          #Section heading for the Frequently Asked Questions block
          heading: Vanligar spurningar
          #FAQ: uploading existing photos — question
          upload_existing_question: Kann eg leggja út myndir, sum eg longu havi?
          #FAQ: uploading existing photos — answer
          upload_existing_answer: >
            Ja! So leingi tú veitst umleið nær og hvar ein mynd varð tikin, eru eldri myndir vælkomnar.
          #FAQ: who can use iNaturalist data — question
          who_can_use_question: Hvør kann gera vísindi við iNaturalist eygleiðingum?
          #FAQ: who can use iNaturalist data — answer
          who_can_use_answer: >
            Onkur! Allar iNaturalist-eygleiðingar eru opnar og frítt atkomuligar — fyri granskarar, varðveitingarfólk og forvitin einstaklingar.
          #FAQ: research grade definition — question
          research_grade_question: Hvat merkir "granskingarstig"?
          #FAQ: research grade definition — answer
          research_grade_answer: >
            Tá samfelagið er samd um eina ávísing, verður ein eygleiðing "granskingarstig" og kemur inn í altjóða vísindaliga skráseting. Hvør identifikatión kann hjálpa at fáa tað har.
          #FAQ: whether prior knowledge is needed — question
          no_knowledge_question: Mái eg vita, hvat eg síggi?
          #FAQ: whether prior knowledge is needed — answer
          no_knowledge_answer: >
            Als ikki! Deil eina mynd, og eitt altjóða samfelag av náttúrufrøðingum kann hjálpa tær at eyðmerkja hana.
          #FAQ: whether the app is required — question
          need_app_question: Mái eg brúka appina?
          #FAQ: whether the app is required — answer; references both the website and mobile app
          need_app_answer: >
            Á einum borðteldu virkar iNaturalist.org sera væl. Á eini fartelefon gevur appin tær bestu upplivingina — serliga til at eyðmerkja sløg á ferð.
  number:
    format:
      significant: false
      strip_insignificant_zeros: false
    human:
      format:
        significant: true
        strip_insignificant_zeros: true
