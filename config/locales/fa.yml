  views:
    announcements:
      locales_desc: |
        CMD- یا SHIFT را با فشار کلیک کنید تا چندگانه را انتخاب کنید. انتخاب "همه" یا ساخت نکردن
        یک انتخاب اعلامیه را به همه کاربران بدون در نظر گرفتن
        محلی. انتخاب یک زبان بدون منطقه هدف قرار نمی گیرد
        مناطق با منطقه، به عنوان مثال اگر انگلیسی را انتخاب کرده باشید، ظاهر نمی شود
        برای افرادی که انگلیسی (بریتانیا) را انتخاب کرده اند.
      clients_desc: |
        CMD- یا SHIFT را با فشار کلیک کنید تا چندگانه را انتخاب کنید. انتخاب "همه" یا ساخت نکردن
        یک انتخاب اعلامیه را به همه کاربران بدون در نظر گرفتن
        مشتری.
      end_desc: |
        زمانی در منطقه زمانی حساب شما که این اعلامیه متوقف می شود
        ظاهر. در سراسر مناطق زمانی اعمال می شود، بنابراین همه دیگر نمی بینند
        در عین حال، نه نسبت به زمان محلی آنها.
      excludes_non_site_desc: |
        اگر اعلامیه شما سایتی را هدف قرار می دهد (که اگر شما یک
        مدیر سایت)، این اطلاعیه هایی را که همه سایت ها را هدف قرار می دهند حذف می کند
        این قرار دادن.
      exclude_ip_countries_desc: |
        CMD- یا SHIFT برای انتخاب چندگانه کلیک کنید. کشورهای منتخب نشان داده نمی شوند
        اعلامیه. اگر کشورهای IP انتخاب شده اند، حذف کشورهای IP را انتخاب کنید
        از اولی کم خواهد شد.
      observation_oauth_application_ids_desc: |
        CMD- یا SHIFT را با فشار کلیک کنید تا چندگانه را انتخاب کنید. انتخاب "همه" یا ساخت نکردن
        یک انتخاب اعلامیه را به همه کاربران بدون در نظر گرفتن
        App.
