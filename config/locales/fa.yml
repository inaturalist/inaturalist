      significant: false
      strip_insignificant_zeros: false
    human:
      format:
        significant: true
        strip_insignificant_zeros: true
  activerecord:
    attributes:
      announcement:
        excludes_non_site: سایر اطلاعیه ها را در این مکان که شناسه سایت ندارند پنهان کنید
        #iNat client applications that the user must not have made an observation
        #with to see the announcement
        exclude_observation_oauth_application_ids: حذف ناظران از برنامه ها
        #iNat client applications that the user must have made an observation
