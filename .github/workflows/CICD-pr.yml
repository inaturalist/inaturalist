name: Rails CI/CD Pull Request

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pre-build:
    uses: ./.github/workflows/CI-pre-build.yml
  build-and-test:
    needs: pre-build
    uses: ./.github/workflows/CI-build-test.yml
  e2e-tests:
    uses: ./.github/workflows/CI-e2e-tests.yml
